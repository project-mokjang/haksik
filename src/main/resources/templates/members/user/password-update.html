<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>비밀번호 변경</title>

    <link rel="stylesheet" href="/css/mobileUi.css" th:href="@{/css/mobileUi.css}">
    <link rel="stylesheet" href="/css/base.css" th:href="@{/css/base.css}">
    <link rel="stylesheet" href="/css/members/signup-form.css" th:href="@{/css/members/signup-form.css}">
    <link rel="stylesheet" href="/css/members/user/password-update.css" th:href="@{/css/members/user/password-update.css}">

</head>
<body class="auth-body signup-page">

<div class="mobile-container">

    <div class="header-fixed" style="display: flex; justify-content: space-between; align-items: center; padding: 0 24px; height: 60px;">
        <a href="javascript:history.back()" style="text-decoration: none; color: var(--forest); font-size: 22px; font-weight: 800;">&lt;</a>
        <h1 class="title" style="margin: 0; font-size: 18px; text-align: center; flex: 1;">비밀번호 변경</h1>
        <div style="width: 22px;"></div>
    </div>

    <div class="scroll-area" style="padding-top: 20px;">

        <div class="form-card">
            <form id="passwordForm">
                <div class="form-group">
                    <label for="currentPassword">현재 비밀번호</label>
                    <input type="password" id="currentPassword" placeholder="현재 비밀번호를 입력해주세요" required>
                </div>

                <div class="form-group">
                    <label for="newPassword">새 비밀번호</label>
                    <input type="password" id="newPassword" placeholder="새 비밀번호 입력" required>
                </div>

                <div class="form-group" style="margin-bottom: 0;">
                    <label for="newPasswordConfirm">새 비밀번호 확인</label>
                    <input type="password" id="newPasswordConfirm" placeholder="새 비밀번호 다시 입력" required>
                </div>
            </form>
        </div>

        <button type="button" class="submit-btn" onclick="updatePassword()">변경 완료하기</button>

    </div>
</div>

<script>
    function updatePassword() {
        const currentPassword = document.getElementById('currentPassword').value;
        const newPassword = document.getElementById('newPassword').value;
        const newPasswordConfirm = document.getElementById('newPasswordConfirm').value;

        if (!currentPassword || !newPassword || !newPasswordConfirm) {
            alert('모든 항목을 입력해주세요!');
            return;
        }
        if (newPassword !== newPasswordConfirm) {
            alert('새 비밀번호와 비밀번호 확인이 일치하지 않습니다.');
            return;
        }

        const requestData = {
            currentPassword: currentPassword,
            newPassword: newPassword,
            newPasswordConfirm: newPasswordConfirm
        };

        fetch('/api/view/user/password-update', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(requestData)
        })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert(data.message);

                    window.location.href = '/api/view/user/my-page';
                } else {
                    alert(data.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('서버와 통신 중 문제가 발생했습니다.');
            });
    }
</script>

</body>
</html>
