<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>비밀번호 변경</title>

    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/common-ui.css}">
    <link rel="stylesheet" th:href="@{/css/members/user.css}">
</head>

<body class="app-body">

<div class="app-page">
    <div class="app-shell">

        <header th:replace="~{fragments/mobile-layout :: appHeader('비밀번호 변경', 'back', 'alarm')}"></header>

        <main class="app-scroll password-update-scroll">

            <form id="passwordForm" class="password-form">

                <div class="password-form-card">

                    <div class="password-field">
                        <label for="currentPassword">현재 비밀번호</label>
                        <input type="password"
                               id="currentPassword"
                               placeholder="현재 비밀번호를 입력해주세요"
                               required>
                    </div>

                    <div class="password-field">
                        <label for="newPassword">새 비밀번호</label>
                        <input type="password"
                               id="newPassword"
                               placeholder="새 비밀번호 입력"
                               required>
                    </div>

                    <div class="password-field last">
                        <label for="newPasswordConfirm">새 비밀번호 확인</label>
                        <input type="password"
                               id="newPasswordConfirm"
                               placeholder="새 비밀번호 다시 입력"
                               required>
                    </div>

                </div>

                <button type="submit" class="password-submit-btn">
                    변경 완료하기
                </button>

            </form>

        </main>

    </div>
</div>

<script th:src="@{/js/common/feedback.js}"></script>
<script th:src="@{/js/members/user/password-update.js}"></script>

</body>
</html>
