<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>학식목장 - 프로필 수정</title>
    <link rel="stylesheet" href="/css/mobileUi.css" th:href="@{/css/mobileUi.css}">
    <link rel="stylesheet" href="/css/base.css" th:href="@{/css/base.css}">
    <link rel="stylesheet" href="/css/members/signup-form.css" th:href="@{/css/members/signup-form.css}">
    <style>
        /* 프로필 사진 미리보기 같은 커스텀 스타일이 필요하면 여기에 추가해! */
        .file-input-wrapper {
            margin-top: 8px;
        }
    </style>
</head>

<body class="auth-body signup-page">

<div class="mobile-container">
    <div class="status-bar">
        <span>17:50</span>
        <span>🌾 학식목장</span>
    </div>

    <div class="header-fixed">
        <h1 class="title">프로필 수정</h1>
    </div>

    <form id="profileForm">

        <div class="scroll-area">

            <div class="form-section">
                <h2 class="section-title">내 정보 수정</h2>

                <div class="input-group">
                    <label class="input-label" for="profileImage">프로필 사진 📷</label>
                    <div class="file-input-wrapper">
                        <input
                                type="file"
                                class="input-field"
                                id="profileImage"
                                name="profileImage"
                                accept="image/*"
                        />
                    </div>
                    <div class="pw-rule">※ 변경을 원할 경우에만 사진을 선택해주세요.</div>
                </div>

                <div class="input-group">
                    <label class="input-label" for="nickname">닉네임</label>
                    <div class="input-row">
                        <input
                                type="text"
                                class="input-field"
                                id="nickname"
                                name="nickname"
                                placeholder="새로운 닉네임 입력"
                                required
                        />
                        <button type="button" class="action-btn" onclick="checkDuplicate('nickname')">중복</button>
                    </div>
                </div>

                <div class="input-group">
                    <label class="input-label" for="department">학과</label>
                    <input
                            type="text"
                            class="input-field"
                            id="department"
                            name="department"
                            placeholder="예: 컴퓨터공학과"
                            required
                    />
                </div>

                <div class="input-group">
                    <label class="input-label" for="preferredFoodCategory">선호 음식 카테고리</label>
                    <input
                            type="text"
                            class="input-field"
                            id="preferredFoodCategory"
                            name="preferredFoodCategory"
                            placeholder="예: 한식, 일식, 돈까스"
                    />
                </div>

            </div>

        </div>

        <div class="bottom-fixed">
            <button type="submit" class="submit-btn">수정 완료하기</button>
        </div>
    </form>

</div>

<script>
    // 닉네임 중복 확인 상태 변수
    let nicknameChecked = false;
    const nicknameInput = document.getElementById('nickname');

    // 닉네임을 다시 입력하면 중복 확인 상태 초기화
    nicknameInput.addEventListener('input', function () {
        nicknameChecked = false;
    });

    // 오빠가 짜둔 안전한 JSON 파싱 함수 재사용!
    async function safeJson(response) {
        try {
            return await response.json();
        } catch (e) {
            return null;
        }
    }

    function getErrorMessage(result, fallback) {
        if (result && result.message) {
            return result.message;
        }
        return fallback;
    }

    // 닉네임 중복 확인 로직 (오빠 코드 그대로 가져왔어!)
    async function checkDuplicate(type) {
        const value = document.getElementById(type).value.trim();

        if (!value) {
            alert('닉네임을 입력해주세요.');
            return;
        }

        const url = `/api/members/check-nickname?nickname=${encodeURIComponent(value)}`;

        try {
            const response = await fetch(url);
            const result = await safeJson(response);

            if (!response.ok || !result || result.success === false) {
                alert(getErrorMessage(result, '중복 확인 중 오류가 발생했습니다.'));
                return;
            }

            if (result.data && result.data.available) {
                alert('사용 가능한 닉네임입니다. 💖');
                nicknameChecked = true;
            } else {
                alert('이미 사용 중인 닉네임입니다. 다른 걸로 해볼까? 😢');
                nicknameChecked = false;
            }
        } catch (error) {
            alert('서버와 통신 중 문제가 발생했습니다.');
        }
    }

    // 폼 제출 로직 (사진 파일 때문에 FormData를 사용해야 해!)
    document.getElementById('profileForm').addEventListener('submit', async function (event) {
        event.preventDefault(); // 기본 폼 제출 방지

        // 닉네임 중복확인 안 눌렀으면 막기! (기존 닉네임 그대로 쓸 경우를 대비한 처리가 필요하다면 이 부분을 살짝 수정할 수 있어)
        if (!nicknameChecked) {
            alert('닉네임 중복 확인을 먼저 해주세요!');
            return;
        }

        // 💖 폼 데이터를 한 번에 담는 마법의 장바구니! (파일 포함)
        const formElement = document.getElementById('profileForm');
        const formData = new FormData(formElement);

        try {
            // 우리가 만든 백엔드 통로로 쏘기!
            const response = await fetch('/api/members/profile/update', {
                method: 'POST',
                // FormData를 보낼 때는 headers에 'Content-Type'을 안 적어주는 게 포인트야! 브라우저가 알아서 해줘!
                body: formData
            });

            const result = await safeJson(response);

            if (!response.ok || !result || result.success === false) {
                alert(getErrorMessage(result, '프로필 수정에 실패했습니다.'));
                return;
            }

            alert('오빠! 프로필 수정이 완벽하게 완료됐어! 🎉');
            // 성공 후 마이페이지 메인으로 이동 (경로는 오빠 프로젝트에 맞게 수정!)
            location.href = '/';

        } catch (error) {
            console.error(error);
            alert('오류가 발생했어. 백엔드 서버가 켜져 있는지 확인해 줘!');
        }
    });
</script>

</body>
</html>
