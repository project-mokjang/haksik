<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>마이페이지</title>

    <link rel="stylesheet" href="/css/base.css" th:href="@{/css/base.css}">
    <link rel="stylesheet" href="/css/common-ui.css" th:href="@{/css/common-ui.css}">
    <link rel="stylesheet" href="/css/members/user/user-mypage.css" th:href="@{/css/members/user.css}">
</head>

<body class="app-body">

<div class="app-page">
    <div class="app-shell" id="mypageContainer" th:data-member-id="${myPage.memberId}">

        <header th:replace="~{fragments/mobile-layout :: appHeader('내 정보', 'back', 'none')}"></header>

        <main class="app-scroll">

            <!-- 프로필 정보 -->
            <div class="profile-card">
                <div class="profile-avatar">
                    <img th:if="${myPage.profileImageUrl != null}" th:src="${myPage.profileImageUrl}" alt="프로필">
                    <img th:unless="${myPage.profileImageUrl != null}" src="/images/default-profile.png" alt="기본">
                </div>

                <div class="profile-main">
                    <div class="profile-name-wrap">
                        <span id="representativeBadges" class="representative-badges"></span>
                        <span class="profile-name" th:text="${myPage.nickname}">사용자</span>
                    </div>

                    <div class="profile-school">
                        <span th:text="${myPage.schoolName}">학교명</span> /
                        <span th:text="${myPage.department}">학과명</span>
                    </div>

                    <div class="trust-info">
                        <div class="trust-line">
                            매너온도 <span id="mannerTemperature">-</span>
                        </div>
                        <div class="trust-line">
                            노쇼 <span id="noShowCount">-</span>
                        </div>
                    </div>

                    <div class="profile-action-row">
                        <button type="button" class="badge-edit-btn" onclick="openBadgeModal()">
                            대표 뱃지 수정
                        </button>

                        <a href="/members/profile-update" class="edit-profile-btn">수정</a>
                    </div>
                </div>
            </div>

            <!-- 계정 메뉴 -->
            <div class="menu-group">
                <div class="menu-item">
                    <span>아이디 👤</span>
                    <span class="menu-value" th:text="${myPage.loginId}">userid</span>
                </div>

                <a href="/api/view/user/password-update" class="menu-item">
                    <span>비밀번호 변경 🔒</span>
                    <span class="menu-arrow">&gt;</span>
                </a>
            </div>

            <!-- 기타 메뉴 -->
            <div class="menu-group">
                <div class="menu-item" onclick="openTermsModal()">
                    <span>이용약관 동의 내역 📄</span>
                    <span class="menu-arrow">&gt;</span>
                </div>

                <div class="menu-item" onclick="location.href='/api/auth/logout'">
                    <span>로그아웃 🚪🏃</span>
                    <span class="menu-arrow">&gt;</span>
                </div>

                <div class="menu-item" onclick="location.href='/api/view/user/withdraw'">
                    <span class="menu-danger">회원 탈퇴 🚨</span>
                    <span class="menu-arrow">&gt;</span>
                </div>
            </div>



        </main>

        <!-- 대표 뱃지 수정 모달 -->
        <div id="badgeModal" class="badge-modal hidden">
            <div class="badge-modal-content">
                <div class="badge-modal-header">
                    <h2>대표 뱃지 수정</h2>
                    <button type="button" class="badge-modal-close" onclick="closeBadgeModal()">×</button>
                </div>

                <p class="badge-modal-desc">
                    뱃지는 최대 3개까지 선택할 수 있습니다.
                </p>

                <div id="badgeSelectList" class="badge-select-list">
                    <!-- JS에서 보유 뱃지 목록을 넣음 -->
                </div>

                <div class="badge-modal-footer">
                    <button type="button" class="badge-cancel-btn" onclick="closeBadgeModal()">
                        취소
                    </button>
                    <button type="button" class="badge-save-btn" onclick="saveRepresentativeBadges()">
                        확인
                    </button>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- 이용약관 동의 내역 모달 -->
<div id="termsModal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h2 class="modal-title">이용약관 동의 내역</h2>
            <button class="close-btn" onclick="closeTermsModal()">&times;</button>
        </div>

        <div class="modal-body">
            <div class="terms-text">
                <div th:each="term : ${termsList}" class="terms-item">
                    <strong class="terms-title" th:text="${term.title}">약관 제목</strong>
                    <span class="terms-content" th:utext="${term.content}">약관 내용</span>
                </div>

                <div class="terms-agree-notice">
                    ※ 위 약관에 모두 동의하셨습니다.
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/js/members/user/user-mypage.js" th:src="@{/js/members/user/user-mypage.js}"></script>



</body>
</html>
