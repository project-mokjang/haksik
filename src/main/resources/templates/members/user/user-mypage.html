<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>마이페이지</title>

    <link rel="stylesheet" href="/css/mobileUi.css" th:href="@{/css/mobileUi.css}">
    <link rel="stylesheet" href="/css/base.css" th:href="@{/css/base.css}">
    <link rel="stylesheet" href="/css/members/signup-form.css" th:href="@{/css/members/signup-form.css}">
    <link rel="stylesheet" href="/css/members/user/user-mypage.css" th:href="@{/css/members/user/user-mypage.css}">
</head>

<body class="auth-body signup-page">

<div class="mobile-container" id="mypageContainer" th:data-member-id="${myPage.memberId}">

    <!-- 회원가입과 똑같은 헤더 구조 -->
    <div class="header-fixed" style="display: flex; justify-content: space-between; align-items: center; padding: 0 24px; height: 60px;">
        <a href="javascript:history.back()" style="text-decoration: none; color: var(--forest); font-size: 22px; font-weight: 800;">&lt;</a>
        <h1 class="title" style="margin: 0; font-size: 18px; text-align: center; flex: 1;">내 정보</h1>
        <div style="width: 22px;"></div>
    </div>

    <!-- 스크롤 영역 -->
    <div class="scroll-area">

        <!-- 프로필 정보 -->
        <div class="profile-card">
            <div class="profile-avatar">
                <img th:if="${myPage.profileImageUrl != null}" th:src="${myPage.profileImageUrl}" alt="프로필">
                <img th:unless="${myPage.profileImageUrl != null}" src="/images/default-profile.png" alt="기본">
            </div>

            <div class="profile-main">
                <div class="profile-name-wrap">
                    <span id="representativeBadges" class="representative-badges"></span>
                    <span class="profile-name" th:text="${myPage.nickname}">사용자</span>
                </div>

                <div class="profile-school">
                    <span th:text="${myPage.schoolName}">학교명</span> /
                    <span th:text="${myPage.department}">학과명</span>
                </div>

                <div class="trust-info">
                    <div class="trust-line">
                        매너온도 <span id="mannerTemperature">-</span>
                    </div>
                    <div class="trust-line">
                        노쇼 <span id="noShowCount">-</span>
                    </div>
                </div>

                <div class="profile-action-row">
                    <button type="button" class="badge-edit-btn" onclick="openBadgeModal()">
                        대표 뱃지 수정
                    </button>

                    <a href="/members/profile-update" class="edit-profile-btn">수정</a>
                </div>
            </div>
        </div>

        <!-- 계정 메뉴 -->
        <div class="menu-group">
            <div class="menu-item">
                <span>아이디</span>
                <span style="color: #333;" th:text="${myPage.loginId}">userid</span>
            </div>

            <a href="/api/view/user/password-update" class="menu-item">
                <span>비밀번호 변경</span>
                <span style="color: #999;">&gt;</span>
            </a>
        </div>

        <!-- 기타 메뉴 -->
        <div class="menu-group">
            <div class="menu-item" onclick="openTermsModal()">
                <span>이용약관 동의 내역</span>
                <span style="color: #999;">&gt;</span>
            </div>

            <div class="menu-item" onclick="location.href='/api/auth/logout'">
                <span>로그아웃</span>
                <span style="color: #999;">&gt;</span>
            </div>

            <div class="menu-item" onclick="location.href='/api/view/user/withdraw'">
                <span style="color: #d9534f;">회원 탈퇴</span>
                <span style="color: #999;">&gt;</span>
            </div>
        </div>
    </div>

    <!-- 대표 뱃지 수정 모달 -->
    <div id="badgeModal" class="badge-modal hidden">
        <div class="badge-modal-content">
            <div class="badge-modal-header">
                <h2>대표 뱃지 수정</h2>
                <button type="button" class="badge-modal-close" onclick="closeBadgeModal()">×</button>
            </div>

            <p class="badge-modal-desc">
                뱃지는 최대 3개까지 선택할 수 있습니다.
            </p>

            <div id="badgeSelectList" class="badge-select-list">
                <!-- JS에서 보유 뱃지 목록을 넣음 -->
            </div>

            <div class="badge-modal-footer">
                <button type="button" class="badge-cancel-btn" onclick="closeBadgeModal()">
                    취소
                </button>
                <button type="button" class="badge-save-btn" onclick="saveRepresentativeBadges()">
                    확인
                </button>
            </div>
        </div>
    </div>

</div>

<!-- 이용약관 동의 내역 모달 -->
<div id="termsModal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h2 style="margin: 0; font-size: 16px; font-weight: bold; color: #333;">이용약관 동의 내역</h2>
            <button class="close-btn" onclick="closeTermsModal()">&times;</button>
        </div>

        <div class="modal-body">
            <div class="terms-text">
                <div th:each="term : ${termsList}" style="margin-bottom: 20px;">
                    <strong style="display: block; color: #333; margin-bottom: 5px;"
                            th:text="${term.title}">약관 제목</strong>
                    <span style="color: #666; font-size: 13px; line-height: 1.5; display: block;"
                          th:utext="${term.content}">약관 내용</span>
                </div>

                <div style="margin-top: 15px; padding-top: 15px; border-top: 1px dashed #ccc; text-align: center;">
                    <span style="color: #d9534f; font-weight: bold;">※ 위 약관에 모두 동의하셨습니다.</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/js/members/user/user-mypage.js" th:src="@{/js/members/user/user-mypage.js}"></script>

</body>
</html>
