<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>내 리뷰 관리</title>

    <link rel="stylesheet" th:href="@{/css/base.css}">

    <link rel="stylesheet" th:href="@{/css/community/board.css}">
</head>
<body class="app-body">
<div class="app-page">

        <header th:replace="~{fragments/mobile-layout :: appHeader('내 리뷰 관리', 'back', 'none')}"></header>

        <main class="app-scroll board-write-scroll has-bottom-nav" style="padding-top: 16px;">

            <div id="observerTarget" style="height: 30px; margin-bottom: 20px;"></div>
        </main>

        <nav th:replace="~{fragments/mobile-layout :: bottomNav('mypage')}"></nav>

    </div>

<script th:src="@{/js/common/feedback.js}"></script>
