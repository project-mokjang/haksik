<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>학식목장 - 로그인</title>
  <link rel="stylesheet" href="/css/base.css" th:href="@{/css/base.css}">
  <link rel="stylesheet" href="/css/mobileUi.css" th:href="@{/css/mobileUi.css}">
</head>
<body class="auth-body login-page">
<div class="mobile-container">
  <div class="status-bar">
    <span>17:41</span>
    <span>🌾 학식목장</span>
  </div>

  <div class="content">
    <div class="header-section">
      <div class="logo">🐑</div>
      <h1 class="title">학식목장</h1>
    </div>

    <form class="form-section" action="/api/auth/login" method="post" id="loginForm">
      <div class="input-group">
        <label class="input-label" for="loginId">아이디</label>
        <input
                type="text"
                class="input-field"
                id="loginId"
                name="loginId"
                placeholder="아이디를 입력해주세요"
                required
        />
      </div>

      <div class="input-group">
        <label class="input-label" for="password">비밀번호</label>
        <input
                type="password"
                class="input-field"
                id="password"
                name="password"
                placeholder="비밀번호를 입력해주세요"
                required
        />
      </div>

      <label class="remember-row">
        <input type="checkbox" name="rememberMe">
        로그인 상태 유지
      </label>

      <div class="error-msg" id="loginError"></div>

      <button type="submit" class="login-btn">로그인</button>
    </form>

    <div class="link-section">
      <a href="/api/view/find-id" th:href="@{/api/view/find-id}">아이디 찾기</a>
      <div class="divider"></div>
      <a href="/api/view/find-pw" th:href="@{/api/view/find-pw}">비밀번호 찾기</a>
      <div class="divider"></div>
      <a href="/api/view/signup-choice" th:href="@{/api/view/signup-choice}">회원가입 하기</a>
    </div>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const errorMessage = params.get('error');

  if (errorMessage) {
    const loginError = document.getElementById('loginError');
    loginError.innerText = decodeURIComponent(errorMessage);
    loginError.classList.add('visible');
  }
</script>

</body>
</html>
