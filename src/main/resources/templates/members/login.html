<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>학식목장 - 로그인</title>
  <link rel="stylesheet" href="/css/auth.css" th:href="@{/css/auth.css}">
</head>
<body class="auth-body login-page">
<div class="mobile-container">
  <div class="status-bar">
    <span>17:41</span>
    <span>🌾 학식목장</span>
  </div>

  <div class="content">
    <div class="header-section">
      <div class="logo">🐑</div>
      <h1 class="title">학식목장</h1>
    </div>

    <form class="form-section" action="/api/auth/login" method="post">
      <div class="input-group">
        <label class="input-label" for="loginId">아이디</label>
        <input type="text" class="input-field" id="loginId" name="loginId" placeholder="아이디를 입력해주세요" required />
      </div>

      <div class="input-group">
        <label class="input-label" for="password">비밀번호</label>
        <input type="password" class="input-field" id="password" name="password" placeholder="비밀번호를 입력해주세요" required />
      </div>

      <div class="error-msg" id="loginError">아이디 또는 비밀번호를 확인해주세요.</div>

      <button type="submit" class="login-btn">로그인</button>
    </form>

    <div class="link-section">
      <a href="/api/auth/find-id" th:href="@{/api/auth/find-id}">아이디 찾기</a>
      <div class="divider"></div>
      <a href="/api/auth/find-pw" th:href="@{/api/auth/find-pw}">비밀번호 찾기</a>
      <div class="divider"></div>
      <a href="/api/auth/signup-choice" th:href="@{/api/auth/signup-choice}">회원가입 하기</a>
    </div>
  </div>
</div>
</body>
</html>
