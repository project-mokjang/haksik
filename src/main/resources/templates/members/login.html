<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>학식목장 - 로그인</title>

  <link rel="stylesheet" th:href="@{/css/base.css}">
  <link rel="stylesheet" th:href="@{/css/common-ui.css}">
  <link rel="stylesheet" th:href="@{/css/members/auth.css}">
</head>

<body class="app-body">

<div class="app-page">
  <div class="app-shell">

    <main class="app-scroll login-scroll">

      <section class="login-header">
        <div class="login-logo">🐑</div>
        <h1 class="login-title">학식목장</h1>
        <p class="login-subtitle">학교 친구들과 함께하는 매칭 서비스</p>
      </section>

      <form class="login-form"
            action="/api/auth/login"
            method="post"
            id="loginForm">

        <div class="auth-field">
          <label for="loginId">아이디</label>
          <input type="text"
                 id="loginId"
                 name="loginId"
                 placeholder="아이디를 입력해주세요"
                 required>
        </div>

        <div class="auth-field">
          <label for="password">비밀번호</label>
          <input type="password"
                 id="password"
                 name="password"
                 placeholder="비밀번호를 입력해주세요"
                 required>
        </div>

        <label class="remember-row">
          <input type="checkbox" name="rememberMe">
          <span>로그인 상태 유지</span>
        </label>

        <div class="auth-error-msg" id="loginError"></div>

        <button type="submit" class="auth-submit-btn">
          로그인
        </button>
      </form>

      <div class="login-link-section">
        <a th:href="@{/api/view/find-id}">아이디 찾기</a>
        <span class="login-divider"></span>
        <a th:href="@{/api/view/find-pw}">비밀번호 찾기</a>
        <span class="login-divider"></span>
        <a th:href="@{/api/view/signup-choice}">회원가입</a>
      </div>

    </main>

  </div>
</div>

<script th:src="@{/js/members/login.js}"></script>

</body>
</html>
