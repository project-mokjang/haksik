<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>학식목장 - 비밀번호 재설정</title>
  <link rel="stylesheet" href="/css/base.css" th:href="@{/css/base.css}">
  <link rel="stylesheet" href="/css/mobileUi.css" th:href="@{/css/mobileUi.css}">
</head>
<body class="auth-body">
<div class="mobile-container">
  <div class="status-bar">
    <span>17:41</span>
    <span>🌾 학식목장</span>
  </div>

  <div class="content">
    <div class="header-section">
      <div class="logo">🐑</div>
      <h1 class="title">비밀번호 재설정</h1>
    </div>

    <div class="form-section">
      <input type="hidden" id="resetToken" name="resetToken" value="">

      <div class="input-group">
        <label class="input-label" for="newPassword">새 비밀번호</label>
        <input type="password" class="input-field" id="newPassword" name="newPassword" placeholder="새로운 비밀번호를 입력해주세요" required />
      </div>

      <div class="input-group">
        <label class="input-label" for="confirmPassword">새 비밀번호 확인</label>
        <input type="password" class="input-field" id="confirmPassword" name="confirmPassword" placeholder="비밀번호를 다시 한번 입력해주세요" required />
      </div>

      <div class="error-msg" id="resetPwError" style="display: none;">비밀번호가 일치하지 않습니다.</div>

      <button type="button" class="submit-btn" onclick="submitResetPw()">비밀번호 변경하기</button>
    </div>

    <div class="link-section">
      <a href="/api/view/login" th:href="@{/api/view/login}">로그인으로 돌아가기</a>
    </div>
  </div>
</div>

<script>
  async function submitResetPw() {
    // 주소창 뒤에 달고 온 이메일 정보 빼오기
    const urlParams = new URLSearchParams(window.location.search);
    const email = urlParams.get('email');

    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;


    if (!newPassword || !confirmPassword) {
      alert('비밀번호를 모두 입력해주세요.');
      return;
    }

    if (newPassword.length < 8) {
      alert(' 비밀번호는 8글자 이상으로 설정해주세요!');
      return;
    }

    if (newPassword !== confirmPassword) {
      document.getElementById('resetPwError').style.display = 'block';
      return;
    } else {
      document.getElementById('resetPwError').style.display = 'none';
    }

    // 서버로 이메일이랑 새 비밀번호 저장
    const response = await fetch('/api/members/find-pw/reset', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, newPassword: newPassword })
    });

    if (response.ok) {
      alert('비밀번호가 성공적으로 변경되었습니다! 😆 다시 로그인해주세요.');
      window.location.href = '/api/view/login';
    } else {
      // 서버에서 튕겨냈을 때
      const result = await response.json();
      alert(result.message || '비밀번호 변경에 실패했습니다. 다시 시도해주세요.');
    }
  }
</script>
</body>
</html>
