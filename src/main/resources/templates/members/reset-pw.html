<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>학식목장 - 비밀번호 재설정</title>

  <link rel="stylesheet" th:href="@{/css/base.css}">
  <link rel="stylesheet" th:href="@{/css/common-ui.css}">
  <link rel="stylesheet" th:href="@{/css/members/auth.css}">
</head>

<body class="app-body">

<div class="app-page">
  <div class="app-shell">

    <header th:replace="~{fragments/mobile-layout :: appHeader('비밀번호 재설정', 'back', 'none')}"></header>

    <main class="app-scroll find-account-scroll">

      <section class="find-account-header">
        <div class="find-account-logo">🐑</div>
        <h1 class="find-account-title">비밀번호 재설정</h1>
        <p class="find-account-desc">
          새로 사용할 비밀번호를 입력해주세요.<br>
          비밀번호는 8자 이상이어야 합니다.
        </p>
      </section>

      <form class="find-account-form" id="resetPwForm">

        <section class="auth-section">

          <div class="auth-field">
            <label for="newPassword">새 비밀번호</label>
            <input type="password"
                   id="newPassword"
                   name="newPassword"
                   placeholder="새로운 비밀번호를 입력해주세요"
                   required>
          </div>

          <div class="auth-field">
            <label for="confirmPassword">새 비밀번호 확인</label>
            <input type="password"
                   id="confirmPassword"
                   name="confirmPassword"
                   placeholder="비밀번호를 다시 한번 입력해주세요"
                   required>
          </div>

          <div class="auth-error-msg" id="resetPwError">
            비밀번호가 일치하지 않습니다.
          </div>

          <button type="submit" class="auth-submit-btn">
            비밀번호 변경하기
          </button>

        </section>

      </form>

      <div class="find-account-link-section">
        <a th:href="@{/api/view/login}">로그인으로 돌아가기</a>
      </div>

    </main>

  </div>
</div>

<script th:src="@{/js/common/feedback.js}"></script>
<script th:src="@{/js/members/reset-pw.js}"></script>

</body>
</html>
