<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>학식목장 - 비밀번호 재설정</title>
  <link rel="stylesheet" href="/css/auth.css" th:href="@{/css/auth.css}">
</head>
<body class="auth-body">
<div class="mobile-container">
  <div class="status-bar">
    <span>17:41</span>
    <span>🌾 학식목장</span>
  </div>

  <div class="content">
    <div class="header-section">
      <div class="logo">🐑</div>
      <h1 class="title">비밀번호 재설정</h1>
    </div>

    <form class="form-section" action="/api/auth/reset-pw" method="post">
      <input type="hidden" id="resetToken" name="resetToken" value="">

      <div class="input-group">
        <label class="input-label" for="newPassword">새 비밀번호</label>
        <input type="password" class="input-field" id="newPassword" name="newPassword" placeholder="새로운 비밀번호를 입력해주세요" required />
      </div>

      <div class="input-group">
        <label class="input-label" for="confirmPassword">새 비밀번호 확인</label>
        <input type="password" class="input-field" id="confirmPassword" name="confirmPassword" placeholder="비밀번호를 다시 한번 입력해주세요" required />
      </div>

      <div class="error-msg" id="resetPwError">비밀번호가 일치하지 않습니다.</div>

      <button type="submit" class="submit-btn">비밀번호 변경하기</button>
    </form>

    <div class="link-section">
      <a href="/api/view/login" th:href="@{/api/view/login}">로그인으로 돌아가기</a>
    </div>
  </div>
</div>
</body>
</html>
