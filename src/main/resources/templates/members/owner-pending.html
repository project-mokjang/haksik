<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>학식목장 - 승인 대기</title>

    <link rel="stylesheet" href="/css/auth.css" th:href="@{/css/auth.css}">
    <link rel="stylesheet" href="/css/members/owner-pending.css" th:href="@{/css/members/owner-pending.css}">
</head>
<body class="auth-body">
<div class="mobile-container">
    <div class="status-bar">
        <span>17:50</span>
        <span>🌾 학식목장</span>
    </div>

    <div class="content content-between">
        <div class="pending-section">
            <div class="pending-icon">⏳</div>
            <h1 class="title">관리자 승인 대기중</h1>
            <p class="pending-desc">
                점주 회원가입 신청이 완료되었습니다.<br>
                관리자가 사업자 정보를 확인한 뒤<br>
                이용 가능 상태로 변경합니다.
            </p>
        </div>

        <div class="bottom-section">
            <a href="/api/view/login" th:href="@{/api/view/login}" class="next-btn ready link-btn">
                로그인으로 돌아가기
            </a>
        </div>
    </div>
</div>
</body>
</html>
