<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>학식목장 - 비밀번호 찾기</title>
  <link rel="stylesheet" href="/css/mobileUi.css" th:href="@{/css/mobileUi.css}">
  <link rel="stylesheet" href="/css/base.css" th:href="@{/css/base.css}">
</head>
<body class="auth-body">
<div class="mobile-container">
  <div class="status-bar">
    <span>17:41</span>
    <span>🌾 학식목장</span>
  </div>

  <div class="content">
    <div class="header-section">
      <div class="logo">🐑</div>
      <h1 class="title">비밀번호 찾기</h1>
    </div>

    <form class="form-section">
      <input type="hidden" id="emailVerified" name="emailVerified" value="false">

      <div class="input-group">
        <label class="input-label" for="loginId">아이디</label>
        <input type="text" class="input-field" id="loginId" name="loginId" placeholder="가입한 아이디를 입력해주세요" required />
      </div>

      <div class="input-group">
        <label class="input-label" for="email">이메일 인증</label>
        <div class="input-row">
          <input type="email" class="input-field" id="email" name="email" placeholder="가입한 이메일을 입력해주세요" required />
          <button type="button" class="action-btn" onclick="sendFindPwCode()">전송</button>
        </div>
        <div class="input-row" style="margin-top: 4px;">
          <input type="text" class="input-field" id="emailCode" name="emailCode" placeholder="인증번호 6자리 입력" />
          <button type="button" class="action-btn" id="verifyBtn" onclick="verifyFindPwCode()">확인</button>
        </div>
      </div>

      <div class="error-msg" id="findPwError">아이디와 인증번호를 확인해주세요.</div>

      <div class="form-section">
        <button type="button" class="submit-btn" onclick="goToResetPw()">비밀번호 재설정</button>
      </div>
    </form>

    <div class="link-section">
      <a href="/api/view/login" th:href="@{/api/view/login}">로그인으로 돌아가기</a>
    </div>
  </div>
</div>

<script src="/js/auth.js" th:src="@{/js/auth.js}"></script>
<script>
  async function sendFindPwCode() {
    const loginId = document.getElementById('loginId').value;
    const email = document.getElementById('email').value;


    if (!loginId || !email) {
      alert('아이디와 이메일을 모두 입력해주세요.');
      return;
    }


    const response = await fetch('/api/members/find-pw/send-email', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ loginId: loginId, email: email })
    });

    if (response.ok) {
      alert('비밀번호 재설정 인증번호가 전송되었습니다.');
    } else {
      alert('아이디와 이메일 정보를 다시 확인해주세요.');
    }
  }

  async function verifyFindPwCode() {
    const email = document.getElementById('email').value;
    const code = document.getElementById('emailCode').value;

    if (!email || !code) {
      alert('아이디와 이메일, 인증번호를 모두 입력해주세요.');
      return;
    }

    const response = await fetch('/api/members/find-pw/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, code: code })
    });

    if (response.ok) {
      document.getElementById('emailVerified').value = 'true';
      const verifyBtn = document.getElementById('verifyBtn');
      verifyBtn.innerText = '완료';
      verifyBtn.classList.add('success');
      alert('인증이 완료되었습니다.');
    } else {
      alert('인증번호를 확인해주세요.');
    }
  }
  function goToResetPw() {
    // 아까 인증 성공했을 때 'true'로 바꿨던 숨겨진 값 가져오기
    const isVerified = document.getElementById('emailVerified').value;
    const email = document.getElementById('email').value;

    // 인증 안 하고 누르려고 하면 경고
    if (isVerified !== 'true') {
      alert('이메일 인증을 먼저 완료해주세요!');
      return;
    }
    //인증 성공했으면 꼬리표 달고넘어가기
    window.location.href = `/api/view/reset-pw?email=${email}`;
  }
</script>
</body>
</html>
