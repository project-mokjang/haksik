<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>학식목장 - 리뷰 관리</title>

    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/common-ui.css}">
    <link rel="stylesheet" th:href="@{/css/community/board.css}"> <style>
    .review-image-container { display: flex; gap: 8px; margin-top: 12px; overflow-x: auto; }
    .review-image-container img { width: 80px; height: 80px; object-fit: cover; border-radius: 12px; border: 1px solid var(--line); }
    .review-rating { color: #f5a623; font-weight: 900; font-size: 14px; margin-bottom: 6px; }
</style>
</head>
<body class="app-body">
<div class="app-page">
    <div class="app-shell">

        <header th:replace="~{fragments/mobile-layout :: appHeader('리뷰 관리', 'back', 'none')}"></header>

        <main class="app-scroll has-bottom-nav board-list-scroll">

            <ul id="reviewContainer" class="board-post-list">
                <div style="text-align:center; padding: 20px; color: var(--muted); font-weight: 700;">
                    리뷰를 불러오는 중입니다...
                </div>
            </ul>

        </main>

        <nav th:replace="~{fragments/mobile-layout :: ownerBottomNav('review')}"></nav>

    </div>
</div>

<script th:src="@{/js/common/feedback.js}"></script>
<script th:src="@{/js/members/owner/owner-review.js}"></script>
</body>
</html>
