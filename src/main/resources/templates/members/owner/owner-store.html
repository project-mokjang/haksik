<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>학식목장 - 가게 관리</title>

    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/common-ui.css}">
    <link rel="stylesheet" th:href="@{/css/community/board.css}">
    <script type="text/javascript" th:src="@{'https://openapi.map.naver.com/openapi/v3/maps.js?ncpClientId=' + ${naverMapClientId} + '&submodules=geocoder'}"></script>
</head>
<body class="app-body">
<div class="app-page">
    <div class="app-shell">

        <header th:replace="~{fragments/mobile-layout :: appHeader('가게 관리', 'back', 'none')}"></header>

        <main class="app-scroll board-write-scroll has-bottom-nav">

            <form id="storeUpdateForm" class="board-write-form">
                <section class="board-write-card">

                    <div class="board-write-field">
                        <label class="board-write-label" for="storeName">가게 이름</label>
                        <input type="text" id="storeName" class="board-write-input" required>
                    </div>

                    <div class="board-write-field">
                        <label class="board-write-label" for="storeCategory">카테고리</label>
                        <input type="text" id="storeCategory" class="board-write-input" placeholder="예: 한식, 중식, 일식 등" required>
                    </div>

                    <div class="board-write-field">
                        <label class="board-write-label" for="storeAddress">가게 주소 (정확히 입력)</label>
                        <input type="text" id="storeAddress" class="board-write-input" required>
                    </div>

                    <div class="board-write-field">
                        <label class="board-write-label" for="storePhone">전화번호</label>
                        <input type="tel" id="storePhone" class="board-write-input" placeholder="- 없이 숫자만 입력" required>
                    </div>

                    <div class="board-write-field">
                        <label class="board-write-label" for="storeHours">영업 시간</label>
                        <textarea id="storeHours" class="board-write-input board-write-textarea" style="min-height: 80px;" placeholder="예: 평일 10:00 - 22:00" required></textarea>
                    </div>

                    <div class="board-write-field">
                        <label class="board-write-label" for="storeImage">간판 사진 (선택)</label>
                        <input type="file" id="storeImage" name="storeImage" class="board-write-input" accept="image/*" style="padding-top:10px;">
                    </div>

                    <div id="newMenuSection" style="display: none; background-color: var(--ivory2); padding: 15px; border-radius: 14px; margin-top: 15px;">
                        <label class="board-write-label" style="color: var(--green);">대표 메뉴 최초 등록 (1개)</label>
                        <input type="text" id="menuName" class="board-write-input" placeholder="메뉴명 (예: 제육볶음)" style="margin-bottom: 8px;">
                        <input type="number" id="menuPrice" class="board-write-input" placeholder="가격 (숫자만 입력)" style="margin-bottom: 8px;">
                        <input type="file" id="menuImage" class="board-write-input" accept="image/*" style="padding-top:10px;">
                    </div>

                </section>

                <button type="submit" id="submitBtn" class="board-write-submit-btn">
                    데이터 렌더링 중...
                </button>
            </form>

        </main>

        <nav th:replace="~{fragments/mobile-layout :: ownerBottomNav('store')}"></nav>

    </div>
</div>

<script th:src="@{/js/members/owner/owner-store.js}"></script>
</body>
</html>
