<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>학식목장 - 점주 회원가입</title>
    <link rel="stylesheet" href="/css/base.css" th:href="@{/css/base.css}">
    <link rel="stylesheet" href="/css/mobileUi.css" th:href="@{/css/mobileUi.css}">
    <link rel="stylesheet" href="/css/members/signup-form.css" th:href="@{/css/members/signup-form.css}">
    <link rel="stylesheet" href="/css/members/owner-signup.css" th:href="@{/css/members/owner-signup.css}">
</head>
<body class="auth-body signup-page">
<div class="mobile-container">
    <div class="status-bar">
        <span>17:50</span>
        <span>🌾 학식목장</span>
    </div>

    <div class="header-fixed">
        <h1 class="title">점주 회원가입</h1>
    </div>

    <form id="ownerSignupForm" class="signup-form">
        <div class="scroll-area signup-scroll-area">
            <div class="form-section">
                <h2 class="section-title">가입 안내</h2>

                <div class="owner-guide">
                    점주 회원가입은 관리자 승인 후 이용할 수 있습니다.<br>
                    사업자등록번호와 매장 정보를 정확히 입력해주세요.
                </div>
            </div>

            <div class="form-section">
                <h2 class="section-title">로그인 정보</h2>

                <div class="input-group">
                    <label class="input-label" for="loginId">아이디</label>
                    <input type="text" class="input-field" id="loginId" name="loginId" placeholder="사용할 아이디를 입력해주세요" required />
                </div>

                <div class="input-group">
                    <label class="input-label" for="email">이메일</label>
                    <input type="email" class="input-field" id="email" name="email" placeholder="이메일을 입력해주세요" required />
                </div>

                <div class="input-group">
                    <label class="input-label" for="password">비밀번호</label>
                    <input type="password" class="input-field" id="password" name="password" placeholder="비밀번호 입력" required />
                    <div class="pw-rule">※ 영문, 숫자, 특수문자를 포함하여 8~16자리로 입력해주세요.</div>
                </div>

                <div class="input-group">
                    <label class="input-label" for="passwordConfirm">비밀번호 확인</label>
                    <input type="password" class="input-field" id="passwordConfirm" name="passwordConfirm" placeholder="비밀번호 다시 입력" required />
                </div>
            </div>

            <div class="form-section">
                <h2 class="section-title">대표자 정보</h2>

                <div class="input-group">
                    <label class="input-label" for="ownerName">대표자명</label>
                    <input type="text" class="input-field" id="ownerName" name="ownerName" placeholder="대표자명을 입력해주세요" required />
                </div>

                <div class="input-group">
                    <label class="input-label" for="ownerPhone">대표자 연락처</label>
                    <input type="tel" class="input-field" id="ownerPhone" name="ownerPhone" placeholder="- 없이 숫자만 입력" required />
                </div>
            </div>

            <div class="form-section">
                <h2 class="section-title">사업자 정보</h2>

                <div class="input-group">
                    <label class="input-label" for="businessNumber">사업자등록번호</label>
                    <div class="input-row">
                        <input type="text" class="input-field" id="businessNumber" name="businessNumber" placeholder="- 없이 숫자만 입력" required />
                        <button type="button" class="action-btn" id="businessNumberCheckBtn" onclick="checkBusinessNumber()">중복</button>
                    </div>
                    <div class="business-rule">※ 사업자등록번호는 관리자 승인 시 확인됩니다.</div>
                </div>

                <div class="input-group">
                    <label class="input-label" for="businessName">상호명</label>
                    <input type="text" class="input-field" id="businessName" name="businessName" placeholder="매장 또는 사업장명을 입력해주세요" required />
                </div>

                <div class="approval-notice">
                    가입 신청 후 상태는 승인 대기로 저장됩니다.<br>
                    관리자가 사업자 정보를 확인한 뒤 이용 가능 상태로 변경합니다.
                </div>
            </div>
        </div>

        <div class="bottom-fixed">
            <button type="submit" class="submit-btn">가입 신청하기</button>
        </div>
    </form>
</div>

<script src="/js/auth.js" th:src="@{/js/auth.js}"></script>
<script src="/js/members/owner-signup.js" th:src="@{/js/members/owner-signup.js}"></script>
</body>
</html>
