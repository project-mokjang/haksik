<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>학식목장 - 점주 회원가입</title>

    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/common-ui.css}">
    <link rel="stylesheet" th:href="@{/css/members/auth.css}">
</head>


<body class="app-body">

<div class="app-page">
    <div class="app-shell">

        <header th:replace="~{fragments/mobile-layout :: appHeader('점주 회원가입', 'back', 'none')}"></header>

        <form id="ownerSignupForm" class="auth-form">

            <main class="app-scroll auth-scroll">

                <section class="auth-section">
                    <h2 class="auth-section-title">가입 안내</h2>

                    <div class="owner-guide">
                        점주 회원가입은 관리자 승인 후 이용할 수 있습니다.<br>
                        사업자등록번호와 매장 정보를 정확히 입력해주세요.
                    </div>
                </section>

                <section class="auth-section">
                    <h2 class="auth-section-title">로그인 정보</h2>

                    <div class="auth-field">
                        <label for="loginId">아이디</label>

                        <div class="auth-input-row">
                            <input type="text"
                                   id="loginId"
                                   name="loginId"
                                   placeholder="사용할 아이디를 입력해주세요"
                                   required>

                            <button type="button"
                                    class="auth-action-btn"
                                    id="loginIdCheckBtn"
                                    onclick="checkLoginId()">
                                중복
                            </button>
                        </div>
                    </div>

                    <div class="auth-field">
                        <label for="email">이메일</label>

                        <div class="auth-input-row">
                            <input type="email"
                                   id="email"
                                   name="email"
                                   placeholder="이메일을 입력해주세요"
                                   required>

                            <button type="button"
                                    class="auth-action-btn"
                                    id="emailCheckBtn"
                                    onclick="checkEmail()">
                                중복
                            </button>
                        </div>
                    </div>

                    <div class="auth-field">
                        <label for="password">비밀번호</label>
                        <input type="password"
                               id="password"
                               name="password"
                               placeholder="비밀번호 입력"
                               required>

                        <p class="auth-help-text">
                            ※ 영문, 숫자, 특수문자를 포함하여 8~16자리로 입력해주세요.
                        </p>
                    </div>

                    <div class="auth-field">
                        <label for="passwordConfirm">비밀번호 확인</label>
                        <input type="password"
                               id="passwordConfirm"
                               name="passwordConfirm"
                               placeholder="비밀번호 다시 입력"
                               required>
                    </div>
                </section>

                <section class="auth-section">
                    <h2 class="auth-section-title">대표자 정보</h2>

                    <div class="auth-field">
                        <label for="ownerName">대표자명</label>
                        <input type="text"
                               id="ownerName"
                               name="ownerName"
                               placeholder="대표자명을 입력해주세요"
                               required>
                    </div>

                    <div class="auth-field">
                        <label for="ownerPhone">대표자 연락처</label>
                        <input type="tel"
                               id="ownerPhone"
                               name="ownerPhone"
                               placeholder="- 없이 숫자만 입력"
                               required>
                    </div>
                </section>

                <section class="auth-section">
                    <h2 class="auth-section-title">사업자 정보</h2>

                    <div class="auth-field">
                        <label for="businessNumber">사업자등록번호</label>

                        <div class="auth-input-row">
                            <input type="text"
                                   id="businessNumber"
                                   name="businessNumber"
                                   placeholder="- 없이 숫자만 입력"
                                   required>

                            <button type="button"
                                    class="auth-action-btn"
                                    id="businessNumberCheckBtn"
                                    onclick="checkBusinessNumber()">
                                중복
                            </button>
                        </div>

                        <p class="auth-help-text">
                            ※ 사업자등록번호는 관리자 승인 시 확인됩니다.
                        </p>
                    </div>

                    <div class="auth-field">
                        <label for="businessName">상호명</label>
                        <input type="text"
                               id="businessName"
                               name="businessName"
                               placeholder="매장 또는 사업장명을 입력해주세요"
                               required>
                    </div>

                    <div class="approval-notice">
                        가입 신청 후 상태는 승인 대기로 저장됩니다.<br>
                        관리자가 사업자 정보를 확인한 뒤 이용 가능 상태로 변경합니다.
                    </div>
                </section>

            </main>

            <div class="auth-bottom-fixed">
                <button type="submit" class="auth-submit-btn">
                    가입 신청하기
                </button>
            </div>

        </form>

    </div>
</div>

<script th:src="@{/js/members/owner/owner-signup.js}"></script>

</body>
</html>
