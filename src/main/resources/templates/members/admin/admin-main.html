<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{members/admin/fragments/admin-layout :: layout(
        '학식목장 관리자 - 메인',
        'main',
        '관리자 메인',
        ~{::content}
      )}">

<th:block th:fragment="content">

    <div class="dashboard-grid">

        <div class="data-card">
            <h3 class="card-title">회원 관리</h3>
            <p class="card-desc">
                전체 회원, 일반 사용자, 점주, 관리자 계정을 조회하고 상태를 관리합니다.
            </p>
            <a th:href="@{/api/view/admin/members}" class="filter-btn">회원 관리 이동</a>
        </div>

        <div class="data-card">
            <h3 class="card-title">점주 승인 관리</h3>
            <p class="card-desc">
                점주 가입 신청 정보를 확인하고 승인 또는 반려 처리합니다.
            </p>
            <a th:href="@{/api/view/admin/owners}" class="filter-btn">점주 승인 이동</a>
        </div>

        <div class="data-card">
            <h3 class="card-title">추후 관리 기능</h3>
            <p class="card-desc">
                신고 관리, 게시글 블라인드, 리뷰 블라인드는 관련 기능 완성 후 추가합니다.
            </p>
        </div>

    </div>

</th:block>
</html>
