<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>학식목장 관리자 - 사용자 관리</title>
    <link rel="stylesheet" href="/css/admin.css" th:href="@{/css/admin.css}">
</head>
<body>

<aside class="admin-sidebar">
    <div class="admin-logo"><span>🐑</span>학식목장 Admin</div>
    <nav class="admin-menu">
        <a href="/api/view/admin/users" th:href="@{/api/view/admin/users}" class="menu-item active">👥 사용자/제재 관리</a>
        <a href="/api/view/admin/reports" th:href="@{/api/view/admin/reports}" class="menu-item">🚨 분쟁/신고 검토</a>
        <a href="/api/view/admin/boards" th:href="@{/api/view/admin/boards}" class="menu-item">📝 게시판/공지 관리</a>
        <a href="/api/view/admin/owners" th:href="@{/api/view/admin/owners}" class="menu-item">👨‍🍳 점주 권한 관리</a>
        <a href="/api/view/admin/restaurants" th:href="@{/api/view/admin/restaurants}" class="menu-item">🍽️ 식당/리뷰 관리</a>
        <a href="/api/view/admin/stats" th:href="@{/api/view/admin/stats}" class="menu-item">📊 서비스 통계 조회</a>
    </nav>
</aside>

<main class="admin-main">
    <header class="admin-header">
        <h2 class="admin-title">사용자/제제 관리</h2>
        <div class="admin-profile">최고관리자 (admin_01)</div>
    </header>

    <section class="admin-content">
        <div class="data-card">

            <div class="filter-bar">
                <select class="filter-input" id="searchType">
                    <option value="loginId">아이디</option>
                    <option value="nickname">닉네임</option>
                    <option value="schoolName">학교명</option>
                </select>
                <input type="text" class="filter-input" id="keyword" placeholder="검색어를 입력하세요">
                <select class="filter-input" id="statusFilter" style="max-width: 150px;">
                    <option value="ALL">상태 전체</option>
                    <option value="NORMAL">정상</option>
                    <option value="PENALTY">패널티</option>
                    <option value="BANNED">블랙리스트</option>
                </select>
                <button class="filter-btn" onclick="fetchUsers()">검색</button>
            </div>

            <table class="data-table">
                <thead>
                <tr>
                    <th>회원 ID (Login ID)</th>
                    <th>닉네임</th>
                    <th>소속 학교</th>
                    <th>매너 온도</th>
                    <th>신고 누적</th>
                    <th>현재 상태</th>
                    <th>패널티 기간</th>
                    <th>관리</th>
                </tr>
                </thead>
                <tbody id="userTableBody">
                <tr>
                    <td>hakisk123</td>
                    <td>근손실오지마</td>
                    <td>목장대학교</td>
                    <td>36.5°C</td>
                    <td>0회</td>
                    <td><span class="badge normal">정상</span></td>
                    <td>-</td>
                    <td><button class="action-btn" onclick="openModal('badboy99')">상세/제재</button></td>
                </tr>
                <tr>
                    <td>badboy99</td>
                    <td>노쇼전문가</td>
                    <td>경기대학교</td>
                    <td>12.0°C</td>
                    <td>5회</td>
                    <td><span class="badge penalty">패널티 (이용정지)</span></td>
                    <td>~ 26.06.10</td>
                    <td><button class="action-btn" onclick="openModal('badboy99')">해제/블랙</button></td>
                </tr>
                </tbody>
            </table>

        </div>
    </section>
</main>
    <div class="modal-overlay" id="penaltyModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">회원 제재 처리</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div>
                    <label class="modal-label">대상 회원 ID</label>
                    <input type="text" class="modal-select" id="targetUserId" value="badboy99" readonly style="background: var(--ivory2);">
                </div>
                <div>
                    <label class="modal-label">제재(패널티) 수위 선택</label>
                    <select class="modal-select" id="penaltyType">
                        <option value="WARNING">경고 (매너온도 차감)</option>
                        <option value="SUSPEND_3">서비스 이용 정지 3일</option>
                        <option value="SUSPEND_7">서비스 이용 정지 7일</option>
                        <option value="BANNED">블랙리스트 (영구 정지)</option>
                    </select>
                </div>
                <div>
                    <label class="modal-label">제재 사유 (내부 기록용)</label>
                    <textarea class="modal-textarea" id="penaltyReason" placeholder="구체적인 제재 사유를 입력하세요 (예: 잦은 노쇼 및 욕설 신고 5회 누적)"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeModal()">취소</button>
                <button class="btn-submit" onclick="submitPenalty()">제재 적용</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. 가짜 데이터(Mock Data) 10개 생성 (백엔드가 줄 JSON 규격과 동일하게 설계) ---
        const mockUsers = [
            { loginId: 'hakisk123', nickname: '근손실오지마', school: '목장대학교', temp: 36.5, reportCount: 0, status: 'NORMAL', penaltyUntil: '-' },
            { loginId: 'badboy99', nickname: '노쇼전문가', school: '경기대학교', temp: 12.0, reportCount: 5, status: 'PENALTY', penaltyUntil: '2026-06-10' },
            { loginId: 'gachon_king', nickname: '가천대원툴', school: '가천대학교', temp: 45.2, reportCount: 1, status: 'NORMAL', penaltyUntil: '-' },
            { loginId: 'food_lover', nickname: '학식감별사', school: '목장대학교', temp: 52.0, reportCount: 0, status: 'NORMAL', penaltyUntil: '-' },
            { loginId: 'scammer01', nickname: '중고나라론', school: '아주대학교', temp: 0.5, reportCount: 12, status: 'BANNED', penaltyUntil: '영구정지' },
            { loginId: 'study_hard', nickname: '도서관지박령', school: '경기대학교', temp: 38.1, reportCount: 0, status: 'NORMAL', penaltyUntil: '-' },
            { loginId: 'angry_bird', nickname: '분노조절장애', school: '국민대학교', temp: 22.4, reportCount: 3, status: 'PENALTY', penaltyUntil: '2026-06-08' },
            { loginId: 'bob_friend', nickname: '밥친구구함', school: '가천대학교', temp: 41.0, reportCount: 0, status: 'NORMAL', penaltyUntil: '-' },
            { loginId: 'runner_up', nickname: '런닝맨', school: '목장대학교', temp: 29.5, reportCount: 2, status: 'NORMAL', penaltyUntil: '-' },
            { loginId: 'ghost_user', nickname: '잠수함', school: '서울대학교', temp: 18.0, reportCount: 4, status: 'PENALTY', penaltyUntil: '2026-06-15' }
        ];

        // --- 2. 초기 렌더링 트리거 (화면이 켜지면 자동으로 데이터 호출) ---
        window.onload = () => {
            fetchUsers();
        };

        // --- 3. 데이터 조회 및 테이블 렌더링 로직 ---
        function fetchUsers() {
            // 팩트: 나중에는 여기서 fetch('/api/admin/users') 로 진짜 서버 데이터를 가져올 겁니다.
            // 지금은 가짜 데이터 배열을 그대로 렌더링 함수에 던져줍니다.
            renderTable(mockUsers);
        }

        function renderTable(users) {
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = ''; // 렌더링 전, 아까 하드코딩해둔 HTML 껍데기를 싹 비워버림 (초기화)

            // 배열을 순회하면서 동적으로 HTML <tr> 조립
            users.forEach(user => {
                // 상태값에 따라 뱃지(Badge) 색상과 텍스트 분기 처리
                let badgeHtml = '';
                if (user.status === 'NORMAL') {
                    badgeHtml = '<span class="badge normal">정상</span>';
                } else if (user.status === 'PENALTY') {
                    badgeHtml = '<span class="badge penalty">패널티</span>';
                } else if (user.status === 'BANNED') {
                    badgeHtml = '<span class="badge banned">블랙리스트</span>';
                }

                // 동적으로 row 생성 후 데이터 바인딩
                const tr = document.createElement('tr');
                tr.innerHTML = `
            <td>${user.loginId}</td>
            <td>${user.nickname}</td>
            <td>${user.school}</td>
            <td>${user.temp}°C</td>
            <td>${user.reportCount}회</td>
            <td>${badgeHtml}</td>
            <td>${user.penaltyUntil}</td>
            <td><button class="action-btn" onclick="openModal('${user.loginId}')">상세/제재</button></td>
        `;
                tbody.appendChild(tr); // 완성된 한 줄을 표(tbody)에 밀어 넣음
            });
        }

        // --- 4. 모달 제어 로직 (기존과 동일) ---
        function openModal(userId) {
            document.getElementById('targetUserId').value = userId;
            document.getElementById('penaltyModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('penaltyModal').classList.remove('active');
            document.getElementById('penaltyReason').value = '';
        }

        function submitPenalty() {
            const userId = document.getElementById('targetUserId').value;
            const type = document.getElementById('penaltyType').value;
            const reason = document.getElementById('penaltyReason').value;

            if(!reason) {
                alert('제재 사유를 반드시 입력해야 합니다.');
                return;
            }

            alert(`[타점 정확히 타격]\n제재 대상: ${userId}\n제재 유형: ${type}\n사유: ${reason}`);
            closeModal();
        }
    </script>

</body>
</html>
