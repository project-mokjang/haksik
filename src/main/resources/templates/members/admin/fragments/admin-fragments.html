<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">학식목장 관리자</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<body>

<aside class="admin-sidebar" th:fragment="sidebar(activeMenu)">
    <div class="admin-logo">
        <span>🐑</span>
        학식목장 Admin
    </div>

    <nav class="admin-menu">
        <a th:href="@{/api/view/admin/main}"
           class="menu-item"
           th:classappend="${activeMenu == 'main'} ? ' active'">
            🏠 관리자 메인
        </a>

        <a th:href="@{/api/view/admin/members}"
           class="menu-item"
           th:classappend="${activeMenu == 'members'} ? ' active'">
            👥 회원 관리
        </a>

        <a th:href="@{/api/view/admin/owners}"
           class="menu-item"
           th:classappend="${activeMenu == 'owners'} ? ' active'">
            👨‍🍳 점주 승인 관리
        </a>
    </nav>
</aside>

<header class="admin-header" th:fragment="header(title)">
    <h2 class="admin-title" th:text="${title}">관리자 페이지</h2>
    <div class="admin-profile">최고관리자 (admin)</div>
</header>

</body>
</html>
