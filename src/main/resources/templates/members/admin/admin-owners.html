<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{members/admin/fragments/admin-fragments :: head('학식목장 관리자 - 점주 승인 관리')}"></head>

<body>

<aside th:replace="~{members/admin/fragments/admin-fragments :: sidebar('owners')}"></aside>

<main class="admin-main">
  <header th:replace="~{members/admin/fragments/admin-fragments :: header('점주 승인 관리')}"></header>

  <section class="admin-content">
    <div class="data-card">

      <div class="filter-bar">
        <select class="filter-input" id="statusFilter" onchange="fetchOwners()">
          <option value="ALL">전체</option>
          <option value="PENDING">승인 대기</option>
          <option value="APPROVED">승인 완료</option>
          <option value="REJECTED">반려</option>
        </select>

        <button class="filter-btn" onclick="fetchOwners()">조회</button>
      </div>

      <table class="data-table">
        <thead>
        <tr>
          <th>신청번호</th>
          <th>회원 아이디</th>
          <th>사업자명</th>
          <th>대표자명</th>
          <th>대표자 연락처</th>
          <th>사업자번호</th>
          <th>승인상태</th>
          <th>처리일시</th>
          <th>관리</th>
        </tr>
        </thead>
        <tbody id="ownerTableBody">
        </tbody>
      </table>

    </div>
  </section>
</main>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    fetchOwners();
  });

  function fetchOwners() {
    const status = document.getElementById("statusFilter").value;

    fetch(`/api/admin/members/owners?status=${status}`)
            .then(response => {
              if (!response.ok) {
                throw new Error("점주 신청 목록 조회 실패");
              }
              return response.json();
            })
            .then(data => renderOwners(data))
            .catch(error => {
              console.error(error);
              alert("점주 신청 목록 조회 중 오류가 발생했습니다.");
            });
  }

  function renderOwners(owners) {
    const tbody = document.getElementById("ownerTableBody");
    tbody.innerHTML = "";

    if (!owners || owners.length === 0) {
      tbody.innerHTML = `
                <tr>
                    <td colspan="9">조회된 점주 신청이 없습니다.</td>
                </tr>
            `;
      return;
    }

    owners.forEach(owner => {
      const processedAt = owner.processedAt || "-";

      tbody.innerHTML += `
                <tr>
                    <td>${owner.ownerProfileId}</td>
                    <td>${owner.loginId}</td>
                    <td>${owner.businessName}</td>
                    <td>${owner.ownerName}</td>
                    <td>${owner.ownerPhone}</td>
                    <td>${owner.businessNumber}</td>
                    <td>${owner.approvalStatus}</td>
                    <td>${processedAt}</td>
                    <td>
                        ${renderOwnerButtons(owner)}
                    </td>
                </tr>
            `;
    });
  }

  function renderOwnerButtons(owner) {
    if (owner.approvalStatus !== "PENDING") {
      return "-";
    }

    return `
            <button class="action-btn" onclick="alert('승인 기능은 다음 단계에서 연결')">승인</button>
            <button class="action-btn" onclick="alert('반려 기능은 다음 단계에서 연결')">반려</button>
        `;
  }
</script>

</body>
</html>
