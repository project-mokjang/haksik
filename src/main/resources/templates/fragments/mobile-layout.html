<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>

<!-- 공통 헤더 -->
<header th:fragment="appHeader(title, leftType, rightType)" class="app-header">

    <!-- 왼쪽 -->
    <button th:if="${leftType == 'back'}"
            type="button"
            class="app-header-btn"
            onclick="history.back()">
        &lt;
    </button>

    <a th:if="${leftType == 'menu'}"
       th:href="@{/api/view/user/main}"
       class="app-header-btn app-header-home-btn">
        🐑
    </a>

    <div th:if="${leftType == 'none'}" class="app-header-right"></div>

    <!-- 제목 -->
    <div class="app-header-title" th:text="${title}">제목</div>

    <!-- 오른쪽: 알림 -->
    <th:block th:if="${rightType == 'alarm'}"
              th:replace="~{fragments/mobile-layout :: notificationBell}">
    </th:block>


    <!-- 오른쪽: 없음 -->
    <div th:if="${rightType == 'none'}" class="app-header-right"></div>
</header>


<!-- 공통 알림 버튼 -->
<div th:fragment="notificationBell" class="header-bell-wrap">
    <button type="button"
            class="app-header-btn bell-btn"
            onclick="toggleNoti(event)">
        🔔
    </button>

    <div class="bell-badge" id="bellBadge"></div>

    <div class="noti-dropdown"
         id="notiDropdown"
         onclick="event.stopPropagation()">

        <div class="noti-header">알림</div>

        <ul class="noti-list" id="notiList">
            <li class="noti-empty">알림을 불러오는 중...</li>
        </ul>
    </div>
</div>


<!-- 공통 하단 탭바 -->
<nav th:fragment="bottomNav(active)" class="bottom-nav">
    <a th:href="@{/api/view/user/main}"
       th:classappend="${active == 'home'} ? ' on'">
        🏠<br>홈
    </a>

    <a th:href="@{/api/view/user/chat}"
       th:classappend="${active == 'chat'} ? ' on'">
        💬<br>채팅
    </a>

    <a th:href="@{/api/view/community}"
       th:classappend="${active == 'community'} ? ' on'">
        💚<br>커뮤니티
    </a>

    <a th:href="@{/api/view/user/my-page}"
       th:classappend="${active == 'my'} ? ' on'">
        👤<br>마이
    </a>
</nav>

</body>
</html>
