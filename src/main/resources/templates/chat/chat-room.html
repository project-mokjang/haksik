<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>채팅방</title>

  <link rel="stylesheet" th:href="@{/css/base.css}">
  <link rel="stylesheet" th:href="@{/css/common-ui.css}">
  <link rel="stylesheet" th:href="@{/css/chat/chat-room.css}">
  <link rel="stylesheet" th:href="@{/css/chat/chat-message.css}">
</head>
<body class="app-body">

<div class="app-page">
  <div class="app-shell chat-shell" th:data-chat-room-id="${chatRoomId}">

    <header th:replace="~{fragments/mobile-layout :: appHeader('채팅방', 'chatBack', 'chatMenu')}"></header>

    <main id="messageList" class="message-list">
      <!-- JS로 메시지 목록 추가 -->
    </main>

    <div id="editNotice" class="edit-notice hidden">
      <span>메시지 수정 중</span>
      <button type="button" onclick="cancelEditMessage()">취소</button>
    </div>

    <form id="messageForm" class="message-form">

      <!-- + 버튼 영역 -->
      <div class="chat-plus-area">
        <button type="button" id="chatPlusButton" class="chat-plus-button">
          +
        </button>

        <div id="chatPlusMenu" class="chat-plus-menu hidden">
          <button type="button" id="sendImageMenuButton" class="chat-plus-menu-item">
            <span class="plus-menu-icon">🖼️</span>
            <span class="plus-menu-text">사진</span>
          </button>

          <button type="button" id="sendFormMenuButton" class="chat-plus-menu-item">
            <span class="plus-menu-icon">📋</span>
            <span class="plus-menu-text">폼</span>
          </button>

          <button type="button" id="inviteMemberPlusButton" class="chat-plus-menu-item hidden">
            <span class="plus-menu-icon">➕</span>
            <span class="plus-menu-text">초대</span>
          </button>

          <button type="button" id="endChatPlusButton" class="chat-plus-menu-item danger">
            <span class="plus-menu-icon">🚪</span>
            <span class="plus-menu-text">종료</span>
          </button>
        </div>
      </div>

      <!-- 실제 파일 input은 숨김 처리 -->
      <input
              type="file"
              id="chatImageInput"
              accept="image/*"
              class="hidden"
      >

      <input
              type="text"
              id="messageInput"
              class="message-input"
              placeholder="메시지를 입력하세요."
              maxlength="1000"
              autocomplete="off"
      >

      <button type="submit" id="sendButton" class="send-button">전송</button>
    </form>

    <div id="chatMenu" class="chat-menu hidden">
      <button type="button" onclick="openMemberModal()">참여자 보기</button>

      <button type="button" id="inviteMemberMenuButton" class="hidden" onclick="openInviteMemberModal()">
        멤버 초대
      </button>

      <button type="button" id="endChatButton" class="end-chat-menu-button hidden" onclick="endChatRoom()">
        채팅 끝내기
      </button>
    </div>

    <div id="memberModal" class="modal-backdrop hidden">
      <div class="member-modal">
        <div class="member-modal-header">
          <h3>참여자 목록</h3>
          <button type="button" onclick="closeMemberModal()">×</button>
        </div>

        <div id="memberList" class="member-list">
          <!-- JS로 참여자 목록 추가 -->
        </div>
      </div>
    </div>

    <div id="inviteMemberModal" class="modal-backdrop hidden">
      <div class="invite-modal">
        <div class="invite-modal-header">
          <h3>멤버 초대</h3>
          <button type="button" onclick="closeInviteMemberModal()">×</button>
        </div>

        <div class="invite-modal-body">
          <p class="invite-help-text">
            초대할 사용자의 닉네임을 입력해 주세요.
          </p>

          <input
                  type="text"
                  id="inviteNicknameInput"
                  class="invite-nickname-input"
                  placeholder="닉네임 입력"
                  maxlength="30"
                  autocomplete="off"
                  onkeydown="if (event.key === 'Enter') { event.preventDefault(); submitInviteMember(); }"
          >
        </div>

        <div class="invite-actions">
          <button type="button" class="invite-cancel-button" onclick="closeInviteMemberModal()">취소</button>
          <button type="button" class="invite-submit-button" onclick="submitInviteMember()">초대</button>
        </div>
      </div>
    </div>

    <div id="reportModal" class="modal-backdrop hidden">
      <div class="report-modal">
        <div class="report-modal-header">
          <h3>신고하기</h3>
          <button type="button" onclick="closeReportModal()">×</button>
        </div>

        <div class="report-reason-list">
          <label class="report-reason-item">
            <input type="radio" name="reportReason" value="욕설" onchange="handleReportReasonChange()">
            <span>욕설</span>
          </label>

          <label class="report-reason-item">
            <input type="radio" name="reportReason" value="비매너" onchange="handleReportReasonChange()">
            <span>비매너</span>
          </label>

          <label class="report-reason-item">
            <input type="radio" name="reportReason" value="불쾌한 내용" onchange="handleReportReasonChange()">
            <span>불쾌한 내용</span>
          </label>

          <label class="report-reason-item">
            <input type="radio" name="reportReason" value="스팸" onchange="handleReportReasonChange()">
            <span>스팸</span>
          </label>

          <label class="report-reason-item">
            <input type="radio" name="reportReason" value="기타" onchange="handleReportReasonChange()">
            <span>기타</span>
          </label>
        </div>

        <textarea
                id="customReportReason"
                class="custom-report-reason hidden"
                placeholder="신고 사유를 입력해 주세요."
                maxlength="100"></textarea>

        <div class="report-actions">
          <button type="button" class="report-cancel-button" onclick="closeReportModal()">취소</button>
          <button type="button" class="report-submit-button" onclick="submitReport()">신고</button>
        </div>
      </div>
    </div>



    <div id="chatFormTypeModal" class="chat-form-modal-backdrop hidden">
      <div class="chat-form-select-modal">
        <div class="chat-form-modal-header">
          <h3>폼 만들기</h3>
          <button type="button" onclick="closeChatFormTypeModal()">×</button>
        </div>

        <div class="chat-form-type-list">
          <button type="button" class="chat-form-type-card" onclick="openVoteFormCreateModal()">
            <span class="chat-form-type-icon">📋</span>
            <span class="chat-form-type-title">일반 투표</span>
            <span class="chat-form-type-desc">메뉴나 시간을 선택지로 투표합니다.</span>
          </button>

          <button type="button" class="chat-form-type-card" onclick="openPlaceFormCreateModal()">
            <span class="chat-form-type-icon">🗺️</span>
            <span class="chat-form-type-title">지도 장소 투표</span>
            <span class="chat-form-type-desc">지도에서 가게와 장소를 찍고 투표합니다.</span>
          </button>
        </div>
      </div>
    </div>

    <div id="voteFormCreateModal" class="chat-form-modal-backdrop hidden">
      <div class="chat-form-create-modal">
        <div class="chat-form-modal-header">
          <h3>일반 투표 만들기</h3>
          <button type="button" onclick="closeVoteFormCreateModal()">×</button>
        </div>

        <div class="chat-form-field">
          <label for="voteFormTitleInput">투표 제목</label>
          <input type="text" id="voteFormTitleInput" maxlength="100" placeholder="예: 뭐 먹을래?">
        </div>

        <div class="chat-form-field">
          <div class="chat-form-field-row">
            <label>선택지</label>
            <button type="button" class="chat-form-small-button" onclick="addVoteOptionInput()">+ 추가</button>
          </div>

          <div id="voteOptionList" class="vote-option-input-list">
            <!-- JS로 선택지 입력칸 추가 -->
          </div>
        </div>

        <div class="chat-form-actions">
          <button type="button" class="chat-form-cancel-button" onclick="closeVoteFormCreateModal()">취소</button>
          <button type="button" class="chat-form-submit-button" onclick="submitVoteForm()">채팅방에 보내기</button>
        </div>
      </div>
    </div>

    <div id="placeFormCreateModal" class="chat-form-modal-backdrop hidden">
      <div class="chat-form-create-modal">
        <div class="chat-form-modal-header">
          <h3>지도 장소 투표 만들기</h3>
          <button type="button" onclick="closePlaceFormCreateModal()">×</button>
        </div>

        <p class="chat-form-help-text">
          채팅방에 장소 투표 카드를 보내면, 참여자들이 지도에서 가게나 직접 찍은 장소에 투표할 수 있습니다.
        </p>

        <div class="chat-form-field">
          <label for="placeFormTitleInput">장소 투표 제목</label>
          <input type="text" id="placeFormTitleInput" maxlength="100" placeholder="예: 어디서 만날래?">
        </div>

        <div class="chat-form-actions">
          <button type="button" class="chat-form-cancel-button" onclick="closePlaceFormCreateModal()">취소</button>
          <button type="button" class="chat-form-submit-button" onclick="submitPlaceForm()">지도 투표 보내기</button>
        </div>
      </div>
    </div>

    <div id="voteFormDetailModal" class="chat-form-modal-backdrop hidden">
      <div class="chat-form-detail-modal">
        <div class="chat-form-modal-header">
          <h3 id="voteDetailTitle">투표</h3>
          <button type="button" onclick="closeVoteFormDetailModal()">×</button>
        </div>

        <div id="voteDetailOptionList" class="vote-detail-option-list">
          <!-- JS로 선택지 표시 -->
        </div>

        <div class="form-result-section">
          <div class="form-result-title">결과</div>
          <div id="voteResultList" class="vote-result-list">
            <!-- JS로 결과 표시 -->
          </div>
        </div>
      </div>
    </div>

    <div id="placeFormMapModal" class="place-map-modal-backdrop hidden">
      <div class="place-map-modal">
        <div class="place-map-header">
          <div>
            <h3 id="placeMapTitle">장소 투표</h3>
            <p id="placeMapSummary">참여 0명</p>
          </div>
          <button type="button" onclick="closePlaceFormMapModal()">×</button>
        </div>

        <div class="place-map-body">
          <div id="placeVoteMap" class="place-vote-map"></div>

          <div id="placeMapGuide" class="place-map-guide hidden">
            지도에서 추가할 장소 위치를 눌러 주세요.
          </div>

          <div id="customPlacePanel" class="custom-place-panel hidden">
            <div class="custom-place-title">직접 장소 추가</div>
            <div id="customPlaceCoordinateText" class="custom-place-coordinate">선택 좌표</div>

            <input type="text" id="customPlaceNameInput" placeholder="장소명" maxlength="100">
            <input type="text" id="customPlaceAddressInput" placeholder="주소 또는 설명" maxlength="200">

            <div class="custom-place-actions">
              <button type="button" onclick="cancelCustomPlaceAdd()">취소</button>
              <button type="button" onclick="submitCustomPlaceOption()">후보 추가</button>
            </div>
          </div>
        </div>

        <div class="place-map-bottom">
          <div class="place-map-action-row">
            <button type="button" class="place-add-button" onclick="startAddCustomPlaceMode()">장소 추가</button>
            <button type="button" class="place-result-button" onclick="loadPlaceFormResult()">결과 보기</button>
          </div>

          <div class="form-empty-text">
            투표는 지도 위 식당 마커 또는 장소 후보 마커를 눌러서 진행해 주세요.
          </div>

          <div id="placeResultPanel" class="place-result-panel hidden">
            <div class="place-map-section-title">투표 결과</div>
            <div id="placeResultList" class="place-result-list">
              <div class="form-empty-text">결과 보기를 눌러 확인해 주세요.</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="messageMenu" class="message-menu hidden">
      <button type="button" id="editMessageMenuButton" onclick="prepareEditMessage()">수정</button>
      <button type="button" id="deleteMessageMenuButton" class="delete-message-button" onclick="deleteSelectedMessage()">삭제</button>
      <button type="button" id="reportMessageMenuButton" class="report-message-button hidden" onclick="openMessageReportModal()">신고</button>
    </div>
  </div>
</div>

<script th:src="'https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=' + ${naverMapClientId}"></script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script th:src="@{/js/chat/chat-message.js}"></script>
<script th:src="@{/js/chat/chat-room.js}"></script>
</body>
</html>
