<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>학식목장 - 회원가입 유형 선택</title>
  <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body class="auth-body">
<div class="mobile-container">
  <div class="status-bar">
    <span>17:26</span>
    <span>🌾 학식목장</span>
  </div>

  <form class="content content-between" th:action="@{/member/signup-choice}" method="get">
    <div class="header-section main">
      <div class="logo bounce">🐑</div>
      <h1 class="title small">학식목장</h1>
      <p class="subtitle">캠퍼스 라이프의 모든 맛과 만남<br>당신은 어떤 회원인가요?</p>
    </div>

    <div class="type-section">
      <label class="type-card" for="roleUser" onclick="selectRoleCard(this)">
        <div class="icon-box">🎓</div>
        <div class="text-box">
          <h3 class="role-name">일반 이용자 가입</h3>
          <p class="role-desc">오늘의 학식 추천부터 밥친구 매칭, 과팅, 커뮤니티까지 즐겨보세요!</p>
        </div>
        <input type="radio" id="roleUser" name="role" value="USER" hidden required>
        <div class="radio-circle"></div>
      </label>

      <label class="type-card" for="roleOwner" onclick="selectRoleCard(this)">
        <div class="icon-box">👨‍🍳</div>
        <div class="text-box">
          <h3 class="role-name">식당 사장님 가입</h3>
          <p class="role-desc">매장 등록, 메뉴 관리, 예약 및 실시간 웨이팅을 효율적으로 관리하세요!</p>
        </div>
        <input type="radio" id="roleOwner" name="role" value="OWNER" hidden required>
        <div class="radio-circle"></div>
      </label>
    </div>

    <div class="bottom-section">
      <button type="submit" class="next-btn ready">다음 단계로</button>
      <a th:href="@{/member/login}" class="login-link">이미 계정이 있으신가요? <span>로그인하기</span></a>
    </div>
  </form>
</div>

<script>
  function selectRoleCard(card) {
    document.querySelectorAll('.type-card').forEach(item => item.classList.remove('active'));
    card.classList.add('active');
  }
</script>
</body>
</html>
