<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>학식목장 - 일반 이용자 가입</title>
  <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body class="auth-body signup-page">
<div class="mobile-container">
  <div class="status-bar">
    <span>17:50</span>
    <span>🌾 학식목장</span>
  </div>

  <div class="header-fixed">
    <h1 class="title">일반 이용자 가입</h1>
  </div>

  <form th:action="@{/member/signup/user}" method="post" th:object="${userSignupRequest}" id="signupForm">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf != null}">
    <input type="hidden" th:field="*{emailVerified}" id="emailVerified" value="false">

    <div class="scroll-area">
      <div class="form-section">
        <h2 class="section-title">학교 정보</h2>

        <div class="input-group">
          <label class="input-label" for="schoolId">소속 학교</label>
          <select class="input-field" id="schoolId" th:field="*{schoolId}" name="schoolId" required>
            <option value="">학교를 선택해주세요</option>
            <option th:each="school : ${schools}" th:value="${school.id}" th:text="${school.name}">목장대학교</option>
          </select>
          <div class="field-error" th:if="${#fields.hasErrors('schoolId')}" th:errors="*{schoolId}"></div>
        </div>

        <div class="input-group">
          <label class="input-label" for="department">학과</label>
          <input type="text" class="input-field" id="department" th:field="*{department}" name="department" placeholder="예: 컴퓨터공학과" required />
        </div>
      </div>

      <div class="form-section">
        <h2 class="section-title">본인 인증</h2>

        <div class="input-group">
          <label class="input-label" for="schoolEmail">학교 이메일</label>
          <div class="input-row">
            <input type="email" class="input-field" id="schoolEmail" th:field="*{schoolEmail}" name="schoolEmail" placeholder="학교 이메일을 입력해주세요" required />
            <button type="button" class="action-btn" onclick="sendEmailCode()">전송</button>
          </div>
          <div class="input-row">
            <input type="text" class="input-field" id="emailCode" name="emailCode" placeholder="인증번호 6자리 입력" />
            <button type="button" class="action-btn" id="verifyBtn" onclick="verifyEmailCode()">확인</button>
          </div>
        </div>
      </div>

      <div class="form-section">
        <h2 class="section-title">기본 정보</h2>

        <div class="input-group">
          <label class="input-label" for="loginId">아이디</label>
          <div class="input-row">
            <input type="text" class="input-field" id="loginId" th:field="*{loginId}" name="loginId" placeholder="사용할 아이디를 입력해주세요" required />
            <button type="button" class="action-btn" onclick="checkDuplicate('loginId')">중복</button>
          </div>
        </div>

        <div class="input-group">
          <label class="input-label" for="name">이름</label>
          <input type="text" class="input-field" id="name" th:field="*{name}" name="name" placeholder="실명을 입력해주세요" required />
        </div>

        <div class="input-group">
          <label class="input-label" for="nickname">닉네임</label>
          <div class="input-row">
            <input type="text" class="input-field" id="nickname" th:field="*{nickname}" name="nickname" placeholder="앱에서 사용할 닉네임" required />
            <button type="button" class="action-btn" onclick="checkDuplicate('nickname')">중복</button>
          </div>
        </div>

        <div class="input-row">
          <div class="input-group" style="flex: 2;">
            <label class="input-label" for="birthDate">생년월일</label>
            <input type="date" class="input-field" id="birthDate" th:field="*{birthDate}" name="birthDate" required />
          </div>

          <div class="input-group" style="flex: 1;">
            <label class="input-label" for="gender">성별</label>
            <select class="input-field" id="gender" th:field="*{gender}" name="gender" required>
              <option value="M">남성</option>
              <option value="F">여성</option>
            </select>
          </div>
        </div>

        <div class="input-group">
          <label class="input-label" for="phone">전화번호</label>
          <input type="tel" class="input-field" id="phone" th:field="*{phone}" name="phone" placeholder="- 없이 숫자만 입력" required />
        </div>
      </div>

      <div class="form-section">
        <h2 class="section-title">비밀번호</h2>

        <div class="input-group">
          <label class="input-label" for="password">비밀번호</label>
          <input type="password" class="input-field" id="password" th:field="*{password}" name="password" placeholder="비밀번호 입력" required />
          <div class="pw-rule">※ 영문, 숫자, 특수문자를 포함하여 8~16자리로 입력해주세요.</div>
        </div>

        <div class="input-group">
          <label class="input-label" for="passwordConfirm">비밀번호 확인</label>
          <input type="password" class="input-field" id="passwordConfirm" th:field="*{passwordConfirm}" name="passwordConfirm" placeholder="비밀번호 다시 입력" required />
        </div>
      </div>

      <div class="form-section">
        <h2 class="section-title">약관 동의</h2>

        <div class="terms-group">
          <div class="term-item" th:each="term : ${terms}">
            <input type="checkbox"
                   th:id="'term-' + ${term.id}"
                   name="agreedTermIds"
                   th:value="${term.id}"
                   th:required="${term.required}" />
            <label th:for="'term-' + ${term.id}">
              <span th:if="${term.required}">[필수]</span>
              <span th:unless="${term.required}">[선택]</span>
              <span th:text="${term.title}">학식목장 서비스 이용약관 동의</span>
            </label>
          </div>
        </div>
      </div>

      <div class="error-msg visible" th:if="${signupError}" th:text="${signupError}"></div>
    </div>

    <div class="bottom-fixed">
      <button type="submit" class="submit-btn">가입 완료하기</button>
    </div>
  </form>
</div>

<script th:src="@{/js/auth.js}"></script>
<script>
  async function sendEmailCode() {
    const email = document.getElementById('schoolEmail').value;
    if (!email) {
      alert('학교 이메일을 입력해주세요.');
      return;
    }

    await fetch('/api/email-verifications/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, purpose: 'SIGNUP' })
    });

    alert('인증번호가 전송되었습니다.');
  }

  async function verifyEmailCode() {
    const email = document.getElementById('schoolEmail').value;
    const code = document.getElementById('emailCode').value;

    if (!email || !code) {
      alert('이메일과 인증번호를 모두 입력해주세요.');
      return;
    }

    const response = await fetch('/api/email-verifications/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, code: code, purpose: 'SIGNUP' })
    });

    if (response.ok) {
      document.getElementById('emailVerified').value = 'true';
      markVerified('verifyBtn');
      alert('본인 인증이 완료되었습니다.');
    } else {
      alert('인증번호를 확인해주세요.');
    }
  }

  async function checkDuplicate(type) {
    const target = document.getElementById(type);
    if (!target.value) {
      alert('값을 입력해주세요.');
      return;
    }

    const url = type === 'loginId'
      ? `/api/members/check-login-id?loginId=${encodeURIComponent(target.value)}`
      : `/api/members/check-nickname?nickname=${encodeURIComponent(target.value)}`;

    const response = await fetch(url);
    alert(response.ok ? '사용 가능한 값입니다.' : '이미 사용 중입니다.');
  }
</script>
</body>
</html>
