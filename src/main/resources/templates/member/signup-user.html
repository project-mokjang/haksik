<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>학식목장 - 일반 이용자 가입</title>
  <style>
    :root {
      --ivory: #fff7e8;
      --ivory2: #f3e7d3;
      --paper: #fffdf8;
      --card: #fffaf0;
      --green: #126b4f;
      --green2: #168a62;
      --forest: #173f35;
      --soil: #9b622e;
      --muted: #766f65;
      --line: #d9e9d9;
      --red: #d85f4f;
      --radius: 20px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Pretendard, -apple-system, sans-serif;
    }

    body {
      background: radial-gradient(circle at 50% 0%, #fffdf8 0, #fff7e8 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .mobile-container {
      width: 100%;
      max-width: 390px;
      height: 844px;
      background-color: var(--paper);
      border-radius: 40px;
      box-shadow: 0 24px 64px rgba(55, 42, 26, 0.18);
      border: 8px solid var(--forest);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .status-bar {
      height: 40px;
      display: flex;
      justify-content: space-between;
      padding: 0 30px;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      flex-shrink: 0;
    }

    .header-fixed {
      padding: 20px 24px 10px;
      text-align: center;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
      background-color: var(--paper);
      z-index: 10;
    }

    .title {
      font-size: 20px;
      font-weight: 800;
      color: var(--forest);
    }

    .scroll-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .scroll-area::-webkit-scrollbar {
      display: none;
    }

    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--green);
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--ivory2);
    }

    .form-section {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 32px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--forest);
      margin-left: 4px;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    .input-field {
      flex: 1;
      width: 100%;
      height: 48px;
      padding: 0 16px;
      border: 2px solid var(--line);
      border-radius: 12px;
      font-size: 14px;
      background-color: var(--card);
      transition: all 0.3s ease;
      outline: none;
    }

    .input-field:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 4px rgba(18, 107, 79, 0.1);
    }

    .input-field::placeholder {
      color: #b0aba3;
    }

    select.input-field {
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23173f35' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 16px center;
      background-size: 16px;
    }

    .action-btn {
      width: 72px;
      height: 48px;
      background-color: var(--ivory2);
      color: var(--forest);
      border: none;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .action-btn:hover {
      background-color: #e5d5b8;
    }

    .action-btn.success {
      background-color: var(--green);
      color: white;
    }

    .pw-rule {
      font-size: 11px;
      color: var(--muted);
      margin-left: 4px;
      margin-top: -4px;
    }

    .terms-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      background-color: var(--card);
      padding: 16px;
      border-radius: 16px;
      border: 1px solid var(--line);
    }

    .term-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .term-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--green);
      margin-top: 2px;
    }

    .term-item label {
      font-size: 13px;
      color: var(--forest);
      line-height: 1.4;
      font-weight: 500;
    }

    .term-item label span {
      color: var(--red);
      font-weight: 700;
    }

    .bottom-fixed {
      padding: 16px 24px 24px;
      background-color: var(--paper);
      border-top: 1px solid var(--line);
      flex-shrink: 0;
    }

    .submit-btn {
      width: 100%;
      height: 54px;
      background-color: var(--green);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .submit-btn:hover {
      background-color: var(--green2);
    }
  </style>
</head>
<body>

<div class="mobile-container">
  <div class="status-bar">
    <span>17:50</span>
    <span>🌾 학식목장</span>
  </div>

  <div class="header-fixed">
    <h1 class="title">일반 이용자 가입</h1>
  </div>

  <div class="scroll-area">

    <div class="form-section">
      <h2 class="section-title">학교 정보</h2>

      <div class="input-group">
        <label class="input-label">소속 학교</label>
        <input type="text" class="input-field" placeholder="예: 목장대학교" />
      </div>

      <div class="input-group">
        <label class="input-label">학과</label>
        <input type="text" class="input-field" placeholder="예: 양떼목장과" />
      </div>
    </div>

    <div class="form-section">
      <h2 class="section-title">본인 인증</h2>

      <div class="input-group">
        <label class="input-label">학교 이메일</label>
        <div class="input-row">
          <input type="email" class="input-field" id="emailInput" placeholder="학교 이메일을 입력해주세요" />
          <button class="action-btn" onclick="sendCode()">전송</button>
        </div>
        <div class="input-row">
          <input type="text" class="input-field" id="codeInput" placeholder="인증번호 6자리 입력" />
          <button class="action-btn" id="verifyBtn" onclick="verifyCode()">확인</button>
        </div>
      </div>
    </div>

    <div class="form-section">
      <h2 class="section-title">기본 정보</h2>

      <div class="input-group">
        <label class="input-label">아이디</label>
        <input type="text" class="input-field" placeholder="사용할 아이디를 입력해주세요" />
      </div>

      <div class="input-group">
        <label class="input-label">이름</label>
        <input type="text" class="input-field" placeholder="실명을 입력해주세요" />
      </div>

      <div class="input-group">
        <label class="input-label">닉네임</label>
        <input type="text" class="input-field" placeholder="앱에서 사용할 닉네임" />
      </div>

      <div class="input-row">
        <div class="input-group" style="flex: 2;">
          <label class="input-label">생년월일</label>
          <input type="text" class="input-field" placeholder="YYYYMMDD" />
        </div>
        <div class="input-group" style="flex: 1;">
          <label class="input-label">성별</label>
          <select class="input-field">
            <option value="M">남성</option>
            <option value="F">여성</option>
          </select>
        </div>
      </div>

      <div class="input-group">
        <label class="input-label">전화번호</label>
        <input type="tel" class="input-field" placeholder="- 없이 숫자만 입력" />
      </div>
    </div>

    <div class="form-section">
      <h2 class="section-title">비밀번호</h2>

      <div class="input-group">
        <label class="input-label">비밀번호</label>
        <input type="password" class="input-field" placeholder="비밀번호 입력" />
        <div class="pw-rule">※ 영문, 숫자, 특수문자를 포함하여 8~16자리로 입력해주세요.</div>
      </div>

      <div class="input-group">
        <label class="input-label">비밀번호 확인</label>
        <input type="password" class="input-field" placeholder="비밀번호 다시 입력" />
      </div>
    </div>

    <div class="form-section">
      <h2 class="section-title">약관 동의</h2>

      <div class="terms-group">
        <div class="term-item">
          <input type="checkbox" id="term1" />
          <label for="term1"><span>[필수]</span> 학식목장 서비스 이용약관 동의</label>
        </div>
        <div class="term-item">
          <input type="checkbox" id="term2" />
          <label for="term2"><span>[필수]</span> 개인정보 수집 및 이용 동의</label>
        </div>
        <div class="term-item">
          <input type="checkbox" id="term3" />
          <label for="term3"><span>[필수]</span> 위치기반 서비스 이용 약관 동의</label>
        </div>
        <div class="term-item">
          <input type="checkbox" id="term4" />
          <label for="term4"><span>[필수]</span> 신고 및 분쟁 처리 목적의 채팅 내역 열람 정책 동의</label>
        </div>
      </div>
    </div>

  </div>

  <div class="bottom-fixed">
    <button class="submit-btn" onclick="handleSignup()">가입 완료하기</button>
  </div>
</div>

<script>
  let isVerified = false;

  function sendCode() {
    const email = document.getElementById('emailInput').value;
    if(!email) {
      alert("학교 이메일을 입력해주세요!");
      return;
    }
    alert("인증번호가 전송되었습니다.");
  }

  function verifyCode() {
    const code = document.getElementById('codeInput').value;
    if(!code) {
      alert("인증번호를 입력해주세요.");
      return;
    }
    isVerified = true;
    const verifyBtn = document.getElementById('verifyBtn');
    verifyBtn.innerText = "완료";
    verifyBtn.classList.add("success");
    alert("본인 인증이 완료되었습니다.");
  }

  function handleSignup() {
    if(!isVerified) {
      alert("학교 이메일 본인인증을 완료해주세요.");
      return;
    }

    const term1 = document.getElementById('term1').checked;
    const term2 = document.getElementById('term2').checked;
    const term3 = document.getElementById('term3').checked;
    const term4 = document.getElementById('term4').checked;

    if(!term1 || !term2 || !term3 || !term4) {
      alert("필수 약관에 모두 동의해주세요.");
      return;
    }

    alert("학식목장 회원가입이 완료되었습니다! 환영합니다 🚀");
    location.href = "login.html";
  }
</script>
</body>
</html>
