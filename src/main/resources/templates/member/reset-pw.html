<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>학식목장 - 비밀번호 재설정</title>
  <style>
    :root {
      --ivory: #fff7e8;
      --paper: #fffdf8;
      --card: #fffaf0;
      --green: #126b4f;
      --green2: #168a62;
      --forest: #173f35;
      --soil: #9b622e;
      --muted: #766f65;
      --line: #d9e9d9;
      --red: #d85f4f;
      --radius: 20px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Pretendard, -apple-system, sans-serif;
    }

    body {
      background: radial-gradient(circle at 50% 0%, #fffdf8 0, #fff7e8 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .mobile-container {
      width: 100%;
      max-width: 390px;
      height: 844px;
      background-color: var(--paper);
      border-radius: 40px;
      box-shadow: 0 24px 64px rgba(55, 42, 26, 0.18);
      border: 8px solid var(--forest);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .status-bar {
      height: 40px;
      display: flex;
      justify-content: space-between;
      padding: 0 30px;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }

    .content {
      flex: 1;
      padding: 40px 24px;
      display: flex;
      flex-direction: column;
    }

    .header-section {
      text-align: center;
      margin-bottom: 40px;
      margin-top: 10px;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .title {
      font-size: 28px;
      font-weight: 800;
      color: var(--forest);
    }

    .form-section {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--forest);
      margin-left: 4px;
    }

    .input-field {
      width: 100%;
      height: 52px;
      padding: 0 16px;
      border: 2px solid var(--line);
      border-radius: 12px;
      font-size: 15px;
      background-color: var(--card);
      transition: all 0.3s ease;
      outline: none;
    }

    .input-field:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 4px rgba(18, 107, 79, 0.1);
    }

    .input-field::placeholder {
      color: #b0aba3;
    }

    .error-msg {
      font-size: 13px;
      color: var(--red);
      font-weight: 600;
      margin-left: 4px;
      opacity: 0;
      min-height: 16px;
      transition: opacity 0.2s;
    }

    .submit-btn {
      width: 100%;
      height: 56px;
      background-color: var(--green);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
      transition: background-color 0.3s;
    }

    .submit-btn:hover {
      background-color: var(--green2);
    }

    .link-section {
      margin-top: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      font-size: 14px;
    }

    .link-section a {
      color: var(--muted);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .link-section a:hover {
      color: var(--soil);
    }
  </style>
</head>
<body>

  <div class="mobile-container">
    <div class="status-bar">
      <span>17:41</span>
      <span>🌾 학식목장</span>
    </div>

    <div class="content">
      <div class="header-section">
        <div class="logo">🐑</div>
        <h1 class="title">비밀번호 재설정</h1>
      </div>

      <div class="form-section">
        
        <div class="input-group">
          <label class="input-label">새 비밀번호</label>
          <input type="password" class="input-field" id="newPw" placeholder="새로운 비밀번호를 입력해주세요" />
        </div>

        <div class="input-group">
          <label class="input-label">새 비밀번호 확인</label>
          <input type="password" class="input-field" id="confirmPw" placeholder="비밀번호를 다시 한번 입력해주세요" />
        </div>

        <div class="error-msg" id="resetPwError">비밀번호가 일치하지 않습니다.</div>

        <button class="submit-btn" onclick="handleResetPw()">비밀번호 변경하기</button>
      </div>

      <div class="link-section">
        <a href="login.html">로그인으로 돌아가기</a>
      </div>
    </div>
  </div>

  <script>
    function handleResetPw() {
      const newPw = document.getElementById('newPw').value;
      const confirmPw = document.getElementById('confirmPw').value;
      const errorMsg = document.getElementById('resetPwError');

      if (!newPw || !confirmPw) {
        errorMsg.innerText = "비밀번호를 모두 입력해주세요.";
        errorMsg.style.opacity = '1';
        return;
      }

      if (newPw !== confirmPw) {
        errorMsg.innerText = "비밀번호가 일치하지 않습니다.";
        errorMsg.style.opacity = '1';
        return;
      }

      errorMsg.style.opacity = '0';
      alert("비밀번호가 성공적으로 변경되었습니다! ✅\n다시 로그인해주세요.");
      location.href = "login.html";
    }
  </script>
</body>
</html>
