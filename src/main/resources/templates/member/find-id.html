<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>학식목장 - 아이디 찾기</title>
  <style>
    :root {
      --ivory: #fff7e8;
      --ivory2: #f3e7d3;
      --paper: #fffdf8;
      --card: #fffaf0;
      --green: #126b4f;
      --green2: #168a62;
      --forest: #173f35;
      --soil: #9b622e;
      --muted: #766f65;
      --line: #d9e9d9;
      --red: #d85f4f;
      --radius: 20px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Pretendard, -apple-system, sans-serif;
    }

    body {
      background: radial-gradient(circle at 50% 0%, #fffdf8 0, #fff7e8 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .mobile-container {
      width: 100%;
      max-width: 390px;
      height: 844px;
      background-color: var(--paper);
      border-radius: 40px;
      box-shadow: 0 24px 64px rgba(55, 42, 26, 0.18);
      border: 8px solid var(--forest);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .status-bar {
      height: 40px;
      display: flex;
      justify-content: space-between;
      padding: 0 30px;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }

    .content {
      flex: 1;
      padding: 40px 24px;
      display: flex;
      flex-direction: column;
    }

    .header-section {
      text-align: center;
      margin-bottom: 40px;
      margin-top: 10px;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .title {
      font-size: 28px;
      font-weight: 800;
      color: var(--forest);
    }

    .form-section {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--forest);
      margin-left: 4px;
    }


    .input-row {
      display: flex;
      gap: 8px;
    }

    .input-field {
      flex: 1;
      width: 100%;
      height: 52px;
      padding: 0 16px;
      border: 2px solid var(--line);
      border-radius: 12px;
      font-size: 15px;
      background-color: var(--card);
      transition: all 0.3s ease;
      outline: none;
    }

    .input-field:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 4px rgba(18, 107, 79, 0.1);
    }

    .input-field::placeholder {
      color: #b0aba3;
    }


    .action-btn {
      width: 72px;
      height: 52px;
      background-color: var(--ivory2);
      color: var(--forest);
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .action-btn:hover {
      background-color: #e5d5b8;
    }


    .action-btn.success {
      background-color: var(--green);
      color: white;
    }

    .error-msg {
      font-size: 13px;
      color: var(--red);
      font-weight: 600;
      margin-left: 4px;
      opacity: 0;
      min-height: 16px;
      transition: opacity 0.2s;
    }

    .submit-btn {
      width: 100%;
      height: 56px;
      background-color: var(--green);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
      transition: background-color 0.3s;
    }

    .submit-btn:hover {
      background-color: var(--green2);
    }

    .link-section {
      margin-top: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      font-size: 14px;
    }

    .link-section a {
      color: var(--muted);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .link-section a:hover {
      color: var(--soil);
    }
  </style>
</head>
<body>

<div class="mobile-container">
  <div class="status-bar">
    <span>17:41</span>
    <span>🌾 학식목장</span>
  </div>

  <div class="content">
    <div class="header-section">
      <div class="logo">🐑</div>
      <h1 class="title">아이디 찾기</h1>
    </div>

    <div class="form-section">

      <div class="input-group">
        <label class="input-label">이름</label>
        <input type="text" class="input-field" id="nameInput" placeholder="가입한 이름을 입력해주세요" />
      </div>

      <div class="input-group">
        <label class="input-label">이메일 인증</label>
        <div class="input-row">
          <input type="email" class="input-field" id="emailInput" placeholder="가입한 이메일을 입력해주세요" />
          <button class="action-btn" onclick="sendCode()">전송</button>
        </div>
        <div class="input-row" style="margin-top: 4px;">
          <input type="text" class="input-field" id="codeInput" placeholder="인증번호 6자리 입력" />
          <button class="action-btn" id="verifyBtn" onclick="verifyCode()">확인</button>
        </div>
      </div>

      <div class="error-msg" id="findIdError">이름과 인증번호를 확인해주세요.</div>

      <button class="submit-btn" onclick="handleFindId()">아이디 찾기</button>
    </div>

    <div class="link-section">
      <a href="login.html">로그인으로 돌아가기</a>
    </div>
  </div>
</div>

<script>
  let isVerified = false;

  function sendCode() {
    const email = document.getElementById('emailInput').value;
    if(!email) {
      alert("이메일을 먼저 입력해주세요!");
      return;
    }
    alert(`${email} (으)로 인증번호가 전송되었습니다! `);
  }

  function verifyCode() {
    const code = document.getElementById('codeInput').value;
    if(!code) {
      alert("인증번호를 입력해주세요!");
      return;
    }


    isVerified = true;
    const verifyBtn = document.getElementById('verifyBtn');
    verifyBtn.innerText = "완료";
    verifyBtn.classList.add("success");
    alert("인증이 완료되었습니다! ");
  }

  function handleFindId() {
    const name = document.getElementById('nameInput').value;
    const errorMsg = document.getElementById('findIdError');

    if (!name || !isVerified) {
      errorMsg.innerText = "이름을 입력하고 이메일 인증을 완료해주세요.";
      errorMsg.style.opacity = '1';
      return;
    }

    errorMsg.style.opacity = '0';
    alert(`[API 호출 예정]\n이름: ${name}\n아이디를 가입한 이메일로 보냈습니다! `);
  }
</script>
</body>
</html>
