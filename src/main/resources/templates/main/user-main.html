<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>학식목장 메인</title>

    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/common-ui.css}">
    <link rel="stylesheet" th:href="@{/css/main/user-main.css}">
</head>

<body class="app-body">

<div class="app-page">
    <div class="app-shell">

        <header th:replace="~{fragments/mobile-layout :: appHeader('학식목장', 'menu', 'alarm')}"></header>

        <main class="app-scroll has-bottom-nav">

            <section class="main-hero-card">
                <h2>오늘 같이 밥 먹을<br>친구를 찾아볼까요?</h2>
                <p>
                    매칭 모드를 선택하면 현재 위치를 기준으로 지도에서
                    대기 중인 사용자를 확인할 수 있습니다.
                </p>
            </section>

            <div class="main-section-title">매칭 모드</div>

            <article class="mode-card" onclick="enterMatchingMode('MEAL')">
                <div class="mode-icon">🍚</div>
                <div class="mode-info">
                    <div class="mode-title">학식메이트</div>
                    <div class="mode-desc">밥 먹을 사람을 지도에서 찾아요.</div>
                </div>
            </article>

            <article class="mode-card" onclick="enterMatchingMode('BLIND_DATE')">
                <div class="mode-icon">💚</div>
                <div class="mode-info">
                    <div class="mode-title">소개팅</div>
                    <div class="mode-desc">1:1 매칭 상대를 지도에서 확인해요.</div>
                </div>
            </article>

            <article class="mode-card" onclick="enterMatchingMode('GROUP')">
                <div class="mode-icon">👥</div>
                <div class="mode-info">
                    <div class="mode-title">과팅</div>
                    <div class="mode-desc">그룹 단위 매칭 상대를 찾아요.</div>
                </div>
            </article>

            <div class="main-section-title">빠른 메뉴</div>

            <div class="quick-grid">
                <a href="#" class="quick-card">
                    💬 채팅
                    <span>진행 중인 대화</span>
                </a>

                <a href="#" class="quick-card">
                    👤 마이
                    <span>내 정보 관리</span>
                </a>
            </div>

        </main>

        <nav th:replace="~{fragments/mobile-layout :: bottomNav('home')}"></nav>

    </div>
</div>

<script th:src="@{/js/user-main.js}"></script>

</body>
</html>
