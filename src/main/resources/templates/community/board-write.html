<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>학식목장 - 글쓰기</title>
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/common-ui.css}">
    <style>
        .checkbox-group { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
        .checkbox-group input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--green); }
        textarea.ui-input { height: 240px; padding: 16px; resize: none; font-family: inherit; line-height: 1.5; }
    </style>
</head>
<body class="app-body">

<div class="app-page">
    <main class="app-shell">
        <header class="app-header">
            <button class="app-header-btn" onclick="history.back()">◀</button>
            <div class="app-header-title">게시글 작성</div>
            <div style="width: 40px;"></div> </header>

        <section class="app-content">
            <form id="writeForm">
                <div class="ui-field">
                    <label class="ui-label">게시판 선택</label>
                    <select name="boardType" class="ui-select" required>
                        <option value="GLOBAL">전국구 게시판</option>
                        <option value="SCHOOL">우리학교 게시판</option>
                    </select>
                </div>

                <div class="ui-field">
                    <label class="ui-label">말머리</label>
                    <select name="category" class="ui-select" required>
                        <option value="FREE">자유</option>
                        <option value="FOOD">맛집추천</option>
                        <option value="QUESTION">질문</option>
                        <option value="MEETUP">만남</option>
                    </select>
                </div>

                <div class="ui-field">
                    <label class="ui-label">제목</label>
                    <input type="text" name="title" class="ui-input" placeholder="제목을 입력하세요" required>
                </div>

                <div class="ui-field">
                    <label class="ui-label">내용</label>
                    <textarea name="content" class="ui-input" placeholder="타인을 비방하거나 욕설이 포함된 글은 경고 없이 삭제될 수 있습니다." required></textarea>
                </div>

                <div class="ui-field">
                    <div class="checkbox-group">
                        <input type="checkbox" id="anonymousCheck">
                        <label for="anonymousCheck" style="margin: 0; font-size: 14px; font-weight: 700; color: var(--forest);">익명으로 작성하기</label>
                        <input type="hidden" name="anonymousYn" id="anonymousYn" value="N">
                    </div>
                </div>

                <div class="ui-field">
                    <label class="ui-label">사진 첨부 (다중 선택 가능)</label>
                    <input type="file" name="images" class="ui-input" style="padding-top: 12px;" accept="image/*" multiple>
                </div>

                <button type="button" id="submitBtn" class="ui-btn" style="margin-top: 24px;" onclick="submitPost()">등록하기</button>
            </form>
        </section>
    </main>
</div>

<script>
    document.getElementById('anonymousCheck').addEventListener('change', function() {
        document.getElementById('anonymousYn').value = this.checked ? 'Y' : 'N';
    });

    async function submitPost() {
        const btn = document.getElementById('submitBtn');
        const form = document.getElementById('writeForm');
        if (!form.reportValidity()) return;

        const formData = new FormData(form);

        try {
            btn.disabled = true;
            btn.innerText = '업로드 중...';
            const response = await fetch('/api/posts', { method: 'POST', body: formData });

            if (response.ok) {
                alert('게시글이 등록되었습니다.');
                location.replace('/api/view/community');
            } else {
                alert('등록 실패');
            }
        } catch (error) {
            console.error('Error:', error);
        } finally {
            btn.disabled = false;
            btn.innerText = '등록하기';
        }
    }
</script>
</body>
</html>
