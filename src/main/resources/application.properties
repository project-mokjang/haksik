spring.application.name=haksik-mokjang
application-secret.properties


spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://localhost:3306/project_mokjang?useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=1234

spring.jpa.hibernate.ddl-auto=update
dev.dummy-data.enabled=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


spring.profiles.include=local

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

file.upload.dir=uploads
file.upload.url-prefix=/uploads

naver.map.client-id=${NAVER_MAP_CLIENT_ID:}

spring.profiles.active=local
server.servlet.session.persistent=false

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB