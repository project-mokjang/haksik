spring.application.name=haksik-mokjang
application-secret.properties
# DB 연결
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://localhost:3306/project_mokjang?useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=1234

# JPA 설정
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# 3. 이메일 발송 (구글 SMTP) 설정
# ==========================================
spring.profiles.include=local

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=email@gmail.com
spring.mail.password=16-digit-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

file.upload.dir=C:/Sibal/haksik_new/src/main/resources/static/uploads

#naver.map.client-id=${NAVER_MAP_CLIENT_ID:}
#  OpenAI API Key
spring.profiles.active=local

server.servlet.session.persistent=false

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB